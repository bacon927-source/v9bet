<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V9Bet · Component Library Wireframe (Component Contract)</title>
<style>
  :root{--ink:#2b2b2b;--line:#c9c9c9;--line2:#9a9a9a;--muted:#8a8a8a;--paper:#fff;--bg:#ececed;--fill:#f4f4f5;--solid:#3a3a3a;--strike:#b56}
  *{box-sizing:border-box}
  body{margin:0;font:13px/1.5 -apple-system,"Noto Sans TC",Arial,sans-serif;color:var(--ink);background:var(--bg)}
  .app{display:grid;grid-template-columns:240px 1fr 320px;min-height:100vh}
  aside{background:var(--paper);border-right:1px solid var(--line);padding:14px;overflow:auto;max-height:100vh}
  main{padding:20px;overflow:auto}
  .spec{background:var(--paper);border-left:1px solid var(--line);padding:16px;overflow:auto;max-height:100vh}
  h1{font-size:15px;margin:0 0 4px}.sub{color:var(--muted);font-size:12px;margin:0 0 10px}
  .grp{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:12px 0 4px}
  .nav{display:block;width:100%;text-align:left;border:1px solid transparent;background:none;border-radius:6px;padding:6px 8px;font-size:12.5px;cursor:pointer;color:#333}
  .nav:hover{background:var(--fill)}.nav.on{background:#e3e3e6;border-color:var(--line2);font-weight:600}
  .ctitle{font-size:16px;font-weight:700;margin:0 0 2px}
  .cnote{font-size:12px;color:var(--muted);margin-bottom:14px}
  /* stage */
  .stage{position:relative;border:1px solid var(--line2);border-radius:10px;background:#fafafa;min-height:300px;padding:18px;overflow:hidden}
  .vlabel{font-size:10.5px;color:var(--muted);margin:14px 0 5px;font-weight:600}
  .vlabel:first-child{margin-top:0}
  .backdrop{border:1px dashed var(--line2);border-radius:8px;background:#fff;padding:12px;color:#bbb}
  .sk{height:12px;border-radius:5px;background:linear-gradient(90deg,#eee 25%,#e0e0e0 37%,#eee 63%);background-size:400% 100%;animation:sh 1.4s ease infinite;margin:7px 0}
  @keyframes sh{0%{background-position:100% 50%}100%{background-position:0 50%}}
  /* component visuals (grayscale) */
  .toast{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line2);border-left:4px solid var(--solid);border-radius:8px;padding:9px 12px;font-size:12px;box-shadow:0 4px 14px rgba(0,0,0,.12);margin:6px 0;max-width:340px}
  .toast .ico{width:18px;text-align:center}.toast .x{margin-left:auto;color:#aaa}
  .toast.err{border-left-color:var(--strike)}.toast.ok{border-left-color:#6a8}
  .snack{display:flex;align-items:center;gap:10px;background:var(--solid);color:#fff;border-radius:8px;padding:10px 13px;font-size:12px;max-width:340px;margin:6px 0}
  .snack b{margin-left:auto;text-decoration:underline;cursor:pointer}
  .dim{position:relative;background:repeating-linear-gradient(45deg,#eee,#eee 8px,#e6e6e6 8px,#e6e6e6 16px);border-radius:8px;min-height:150px;display:grid;place-items:center}
  .modal{background:#fff;border:2px solid var(--solid);border-radius:12px;padding:16px;max-width:280px;box-shadow:0 10px 30px rgba(0,0,0,.2);position:relative}
  .modal .x{position:absolute;right:10px;top:8px;color:#aaa}
  .banner{display:flex;align-items:center;gap:9px;border:1px solid var(--line2);background:var(--fill);border-radius:8px;padding:9px 12px;font-size:12px;margin:6px 0}
  .banner .x{margin-left:auto;color:#aaa}
  .marq{border:1px solid var(--line);border-radius:6px;background:var(--fill);padding:7px 0;overflow:hidden;white-space:nowrap;position:relative;margin:6px 0}
  .marq span{display:inline-block;padding-left:100%;animation:mq 12s linear infinite;font-size:12px;color:#555}
  @keyframes mq{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
  .btnrow{display:flex;gap:8px;margin-top:12px}
  .b{border:1px solid var(--line2);background:#fff;border-radius:7px;padding:7px 12px;font-size:12px;text-align:center;flex:1}
  .b.k{background:var(--solid);color:#fff;border-color:var(--solid)}
  .sheet{position:absolute;right:0;top:0;bottom:0;width:230px;background:#fff;border-left:2px solid var(--solid);box-shadow:-8px 0 24px rgba(0,0,0,.15);padding:14px}
  .fab{width:44px;height:44px;border-radius:50%;border:1px solid var(--line2);background:#fff;display:grid;place-items:center;font-size:16px;box-shadow:0 4px 12px rgba(0,0,0,.18)}
  .chatpanel{width:220px;border:1px solid var(--line2);border-radius:10px;background:#fff;box-shadow:0 8px 22px rgba(0,0,0,.15);overflow:hidden}
  .chatpanel .h{background:var(--fill);padding:8px 10px;font-size:12px;font-weight:700;display:flex;justify-content:space-between}
  .bub{margin:6px 8px;border:1px solid var(--line);background:var(--fill);border-radius:9px;padding:6px 9px;font-size:11px;max-width:80%}
  .empty{text-align:center;color:#aaa;padding:24px}
  .empty .e{font-size:30px}
  .timeline{display:flex;align-items:center;gap:6px;font-size:11px;color:#666;margin:8px 0}
  .timeline .n{width:18px;height:18px;border-radius:50%;border:1px solid var(--line2);display:grid;place-items:center;font-size:10px}
  .timeline .n.on{background:var(--solid);color:#fff;border-color:var(--solid)}
  .timeline .ln{flex:1;height:1px;background:var(--line2)}
  .prog{height:9px;border-radius:5px;background:#e3e3e3;overflow:hidden;margin:6px 0;max-width:300px}.prog i{display:block;height:100%;background:var(--solid)}
  .badge{display:inline-block;font-size:10px;border:1px solid var(--line2);border-radius:4px;padding:1px 7px;color:#666;margin:3px}
  .badge.k{background:var(--solid);color:#fff;border-color:var(--solid)}
  .badge.dot{position:relative}.badge.dot::after{content:"";position:absolute;top:-3px;right:-3px;width:7px;height:7px;border-radius:50%;background:var(--strike)}
  .chip{display:inline-block;border:1px solid var(--line);border-radius:14px;padding:3px 11px;font-size:11px;color:#666;margin:3px}.chip.on{background:var(--solid);color:#fff;border-color:var(--solid)}
  .seg{display:inline-flex;border:1px solid var(--line2);border-radius:8px;overflow:hidden;margin:4px 0}
  .seg span{padding:7px 16px;font-size:12px;color:var(--muted);border-right:1px solid var(--line)}.seg span:last-child{border:0}.seg span.on{background:var(--solid);color:#fff}
  .stepper{display:flex;align-items:center;gap:6px;margin:8px 0}
  .stepper .s{width:22px;height:22px;border-radius:50%;border:1px solid var(--line2);display:grid;place-items:center;font-size:11px;color:#888}
  .stepper .s.on{background:var(--solid);color:#fff;border-color:var(--solid)}.stepper .s.done{border-color:var(--solid)}
  .stepper .ln{flex:1;height:1px;background:var(--line2);min-width:18px}
  .count{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:12px;color:#666}
  .sw{width:40px;height:22px;border-radius:12px;border:1px solid var(--line2);position:relative;display:inline-block;vertical-align:middle}
  .sw i{position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;border:1px solid var(--line2)}
  .sw.on{background:var(--solid)}.sw.on i{right:2px}.sw.off i{left:2px}
  .ticker{border:1px solid var(--line);border-radius:8px;background:var(--fill);padding:9px 12px;font-size:12px;display:flex;justify-content:space-between;max-width:360px}
  .ticker b{font-variant-numeric:tabular-nums}
  /* z-order demo */
  .zdemo{position:relative;height:300px;border:1px dashed var(--line2);border-radius:8px;background:#fff;overflow:hidden}
  .zlayer{position:absolute;border-radius:6px;font-size:10.5px;padding:5px 8px;border:1px solid var(--line2);background:#fff;box-shadow:0 3px 10px rgba(0,0,0,.08)}
  /* spec table */
  .spec h2{font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:0 0 8px}
  .spec table{width:100%;border-collapse:collapse;font-size:12px}
  .spec td{border-bottom:1px solid var(--line);padding:6px 4px;vertical-align:top}
  .spec td.k{color:var(--muted);width:74px;white-space:nowrap}
  .tmpl{font-size:10.5px;color:var(--muted);border-top:1px solid var(--line);margin-top:14px;padding-top:9px}
  .langbar{display:flex;gap:6px;margin-bottom:12px}
  .langbar button{flex:1;border:1px solid var(--line2);background:#fff;border-radius:6px;padding:5px 0;font-size:12px;cursor:pointer;color:var(--muted)}
  .langbar button.on{background:var(--solid);color:#fff;border-color:var(--solid);font-weight:600}
</style>
</head>
<body>
<div class="app">
  <aside>
    <h1>V9Bet Component Library</h1>
    <p class="sub">Component Contract · grayscale, no UI<br>Cross-page shared components, 9-column definition</p>
    <div class="langbar"><button data-lang="en" class="on">EN</button><button data-lang="zh">中文</button></div>
    <div id="nav"></div>
  </aside>
  <main>
    <div id="ct" class="ctitle"></div>
    <div id="cn" class="cnote"></div>
    <div id="stage" class="stage"></div>
  </main>
  <div class="spec" id="spec"></div>
</div>

<script>
const VL=t=>`<div class="vlabel">${t}</div>`;
const C={
/* ---------- Notifications/Feedback ---------- */
toast:{g:"Notifications/Feedback",name:"Toast transient toast",note:"Non-blocking notice for system/API events, auto-dismisses, can stack over the product page.",
 render:()=>VL("variants:info / success / error")+
  `<div class="toast"><span class="ico">🔔</span>Your deposit has been credited ₫1,000,000<span class="x">✕</span></div>`+
  `<div class="toast ok"><span class="ico">✓</span>Bet placed<span class="x">✕</span></div>`+
  `<div class="toast err"><span class="ico">!</span>Connection timeout, please retry<span class="x">✕</span></div>`+
  VL("with action (max 1)")+
  `<div class="toast"><span class="ico">⚽</span>Goal scored in your match<span style="margin-left:auto;text-decoration:underline">View</span></div>`+
  VL("queue (show 1–2 at a time, rest queued)")+`<div class="backdrop" style="font-size:11px">Queue: toast1 → toast2 → … (don't pile them up at once)</div>`,
 spec:{Purpose:"Briefly inform of system/action results",Trigger:"System / API callback (credit, goal, settlement)",Position:"Top or top-right",Duration:"Auto 3–5s · manual close",Blocking:"No (non-modal)",Layer:"z40",Variants:"info / success / error · optional 1 action",Source:"System / API",a11y:"role=status (aria-live polite)"}},

snackbar:{g:"Notifications/Feedback",name:"Snackbar actionable",note:"Bottom notice after a user action, often with \"Undo\".",
 render:()=>VL("bottom · with action")+`<div class="snack">Removed from favorites<b>Undo</b></div>`+`<div class="snack">Coupon applied<b>Change</b></div>`,
 spec:{Purpose:"Action feedback + quick reverse",Trigger:"After a user action",Position:"Bottom center",Duration:"4s · with undo",Blocking:"No",Layer:"z40",Variants:"Default + 1 action",Source:"Frontend",a11y:"role=status"}},

modal:{g:"Notifications/Feedback",name:"Modal Dialog",note:"Centered, dims and blocks the layer below, requires an explicit choice. One modal at a time; the rest queue.",
 render:()=>{
  const MD=(title,body,buttons,icon='')=>`<div class="dim" style="min-height:auto;padding:14px"><div class="modal" style="max-width:300px;text-align:left;padding:0"><div style="display:flex;align-items:center;gap:8px;padding:12px 14px 10px;border-bottom:1px solid #eee">${icon?`<span style="font-size:14px">${icon}</span>`:''}<b style="flex:1;font-size:13px">${title}</b><span style="color:#aaa">✕</span></div><div style="padding:11px 14px;font-size:11.5px;color:#777">${body}</div><div style="display:flex;gap:8px;justify-content:flex-end;padding:0 14px 13px">${buttons}</div></div></div>`;
  const B=(t,k=false)=>`<span class="b ${k?'k':''}" style="flex:0 0 auto;min-width:78px">${t}</span>`;
  return VL("Anatomy — fixed header (title + ✕), scrollable body, right-aligned footer (secondary → primary)")+
   MD('Title',`Concise message or a short form. Body scrolls if long; header &amp; footer stay pinned.`,B('Secondary')+B('Primary',true))+
   VL("Confirmation — irreversible / destructive (primary carries the consequence)")+
   MD('Set account currency to VND?',`This is permanent and <b>cannot be changed</b> later. All balances and deposits will be settled in VND.`,B('Cancel')+B('Set currency',true),'⚠️')+
   VL("Promotional — opt-in, dismissible")+
   MD('Limited-time offer',`Claim your <b>100% first-deposit bonus</b> · churn x10. Ends in 23:59.`,B('Maybe later')+B('Claim now',true),'🎁')+
   VL("Acknowledge — single action, informational")+
   MD('Scheduled maintenance',`Wallet & payments pause 02:00–04:00 (GMT+8). In-play bets are unaffected.`,B('Got it',true),'🛠')+
   `<div style="font-size:11px;color:#666;margin-top:10px">Dismiss via ✕ / Cancel / backdrop click / <kbd>Esc</kbd> — except a hard confirm, which requires an explicit button. Primary button sits right; destructive primary should read as the consequence ("Set currency", not "OK").</div>`;
 },
 spec:{Purpose:"Force a clear decision or critical acknowledgement before continuing",Trigger:"Irreversible confirm · opt-in promo · blocking system notice",Position:"Centered, ~480px max (desktop); full-screen sheet on mobile · dimmed scrim",Duration:"Until resolved — action, ✕, backdrop, or Esc (hard confirms: button only)",Blocking:"Yes — focus trap, page scroll locked",Layer:"z50 · mutually exclusive (one at a time, others queue)",Variants:"confirm (destructive) / promo / acknowledge / form",Source:"System (confirms) · CMS (promo/info)",a11y:"role=dialog · aria-modal=true · labelledby+describedby · trap & restore focus · Esc closes"}},

banner:{g:"Notifications/Feedback",name:"Banner / Inline alert",note:"Persistent in-page banner that pushes content down rather than floating (maintenance, KYC reminder).",
 render:()=>VL("warning / info")+
  `<div class="banner">🛠 System maintenance 02:00–04:00<span class="x">✕</span></div>`+
  `<div class="banner">🪪 Complete KYC to withdraw · <span style="text-decoration:underline">Verify now</span><span class="x">✕</span></div>`,
 spec:{Purpose:"Persistent status reminder",Trigger:"Ongoing state (maintenance / KYC incomplete / unbound)",Position:"In-page top · pushes content",Duration:"Persistent dismissible (or always on)",Blocking:"No",Layer:"z10",Variants:"warning / info · may carry action",Source:"System / CMS",a11y:"role=region"}},

marquee:{g:"Notifications/Feedback",name:"Marquee",note:"Looping scrolling announcement/promo text, low priority.",
 render:()=>VL("looping scroll")+`<div class="marq"><span>🎁 100% first deposit this week · ⚽ World Cup rebate 0.8% · 🛠 Maintenance notice 02:00 · 🏆 Player ***8 won ₫12,000,000 …</span></div>`,
 spec:{Purpose:"Low-priority broadcast message",Trigger:"Promo / announcement schedule",Position:"Top banner",Duration:"Looping",Blocking:"No",Layer:"z10",Variants:"Promo / announcement",Source:"CMS",a11y:"Pausable · not required reading"}},

sysmsg:{g:"Notifications/Feedback",name:"System Message",note:"Maintenance/goal/settlement etc., goes to inbox + may also fire toast/push.",
 render:()=>VL("same message, multiple channels")+
  `<div class="toast"><span class="ico">🧾</span>Bet settled +₫210,000<span class="x">✕</span></div>`+
  `<div class="banner">📥 Also written to Inbox (System message)</div>`+
  `<div class="backdrop" style="font-size:11px">＋ Push (OS notification, per notification preferences)</div>`,
 spec:{Purpose:"Multi-channel delivery of important system events",Trigger:"Maintenance / goal / settlement / delay",Position:"toast + inbox + push",Duration:"toast transient · inbox persistent",Blocking:"No",Layer:"z40 + inbox",Variants:"maintenance/goal/settlement/delay",Source:"System",a11y:"role=status + inbox list"}},

/* ---------- Overlays ---------- */
sheet:{g:"Overlays",name:"Bottom sheet / Slide-in panel",note:"Panel sliding in from an edge, holds flow forms (real shots: Banking deposit/withdraw, Wallet).",
 render:()=>VL("slide in from right (Desktop) · pull up from bottom (Mobile)")+
  `<div class="dim" style="min-height:260px"><div class="sheet"><div style="font-weight:700;font-size:12px;border-bottom:1px solid #eee;padding-bottom:6px">Banking</div><div class="seg" style="margin:8px 0"><span class="on">Deposit</span><span>Withdrawal</span></div><div class="backdrop" style="height:120px">Payment methods / form</div></div></div>`,
 spec:{Purpose:"Carry multi-step forms/flows without leaving the page",Trigger:"Tap deposit/withdraw/wallet",Position:"Slide right (Desktop) / pull up (Mobile)",Duration:"Manual close · drag to close",Blocking:"Semi-blocking (dimmed background, tap to close)",Layer:"z20",Variants:"deposit / withdrawal / wallet",Source:"System / API",a11y:"role=dialog · closable"}},

overlayx:{g:"Overlays",name:"Cross-product shortcut Overlay",note:"Surfaces shortcuts to other products on a product page for cross-traffic (SBK↔Live). docx54.",
 render:()=>`<div class="dim" style="min-height:180px"><div class="modal" style="max-width:240px"><span class="x">✕</span><div style="font-weight:700;font-size:12px">Cross-product shortcuts</div><div style="display:flex;gap:6px;margin-top:8px">${['Sports','Live','Lottery'].map(x=>`<div class="b">${x}</div>`).join('')}</div></div></div>`,
 spec:{Purpose:"Drive traffic between products",Trigger:"Enter product page / tap shortcut button",Position:"Overlays the product page (mind the layer order)",Duration:"Manual close",Blocking:"Semi-blocking",Layer:"z20",Variants:"Shortcuts matched to the current product",Source:"CMS",a11y:"role=dialog"}},

streamoverlay:{g:"Overlays",name:"Live Stream Player (Inline / PiP / Fullscreen)",note:"Watch & bet. Starts inline on the match page, shrinks to a draggable PiP that keeps playing across pages. docx38/54/62.",
 render:()=>VL("① Inline — on the match page")+
  `<div class="dim" style="min-height:104px"><div style="position:absolute;left:14px;top:14px;right:14px;height:74px;border:2px solid var(--solid);border-radius:8px;background:#fff;display:grid;place-items:center;color:#888;font-size:11px">📺 Live (with host) &nbsp; ▢ PiP &nbsp; ⤢ Fullscreen</div></div>`+
  VL("② PiP — floating mini-player, persists across pages (Home / other markets / bet slip)")+
  `<div class="dim" style="min-height:150px"><div class="backdrop" style="position:absolute;left:14px;right:14px;top:14px;bottom:14px">Another page (Home / bet slip) — still fully operable</div><div style="position:absolute;right:24px;bottom:24px;width:120px;height:70px;border:2px solid var(--solid);border-radius:8px;background:#fff;display:grid;place-items:center;color:#888;font-size:10px;box-shadow:0 6px 18px rgba(0,0,0,.22);text-align:center">📺 PiP&nbsp;✕<br>drag · snap to corners</div></div>`+
  VL("③ Fullscreen")+
  `<div class="dim" style="min-height:84px"><div style="position:absolute;left:14px;right:14px;top:14px;bottom:14px;border:2px solid var(--solid);border-radius:8px;background:#fff;display:grid;place-items:center;color:#888;font-size:11px">📺 Fullscreen · controls + bet-slip overlay</div></div>`+
  `<div style="font-size:11px;color:#666;margin-top:9px">Rules: <b>one PiP at a time</b> (new stream replaces/asks); PiP keeps playing during navigation; must avoid colliding with <b>Bet Slip</b> &amp; <b>Live Chat</b> button — define avoidance (e.g. PiP owns bottom-right, Chat shifts up).</div>`,
 spec:{Purpose:"Watch & bet — keep the stream alive while browsing/betting other markets",Trigger:"Match-page player · Home Live section · 🔴LIVE on match cards",Position:"Inline → PiP (draggable, snaps to corners) → Fullscreen",Duration:"PiP persists across pages until closed",Blocking:"No (interaction passes through to page below)",Layer:"z25 — overlay band, below Modal(z50), coexists with Chat(z30)/Bet Slip",Variants:"inline / PiP / fullscreen · audio on-off · live-reconnect · single instance",Source:"Streaming API (WebRTC / HLS)",a11y:"Closable · does not steal focus · captions · Mobile: native PiP vs custom (define per OS)"}},

chatwidget:{g:"Overlays",name:"Live Chat Widget",note:"Floating button + expandable panel, always present. docx33.",
 render:()=>VL("collapsed (floating button) → expanded (panel)")+
  `<div style="display:flex;gap:30px;align-items:flex-end"><div class="fab">💬</div>`+
  `<div class="chatpanel"><div class="h">Live support <span>🟢 −</span></div><div class="bub">Hi, I'm the V9 smart assistant~</div><div class="bub" style="margin-left:auto;background:#e3e3e6">My withdrawal?</div><div style="border-top:1px solid #eee;padding:6px;font-size:10px;color:#aaa">Type a message…</div></div></div>`,
 spec:{Purpose:"Reach support anytime (AI→human)",Trigger:"User taps floating button / idle prompt",Position:"Bottom-right floating button",Duration:"Persistent (minimizable)",Blocking:"No",Layer:"z30",Variants:"AI / human / away",Source:"In-house support system",a11y:"role=complementary"}},

idle:{g:"Overlays",name:"Idle assist prompt",note:"Detects inactivity → non-blocking prompt for support/self-service. docx68.",
 render:()=>`<div class="backdrop" style="height:90px;margin-bottom:10px">Product page content</div><div class="toast"><span class="ico">🤖</span>Need help?<span style="margin-left:auto"><span class="badge k">Self-service</span><span class="badge">Support</span></span></div>`,
 spec:{Purpose:"Proactively help new members who get stuck",Trigger:"Idle N seconds (behavior detection)",Position:"Toast level (doesn't interrupt the game)",Duration:"Auto-dismiss / closable",Blocking:"No (modal strictly forbidden)",Layer:"z40",Variants:"Self-service / route to support",Source:"Behavior-detection engine",a11y:"role=status"}},

randompopup:{g:"Overlays",name:"Random survey / lucky popup",note:"Modal triggered randomly or by segment. docx45.",
 render:()=>`<div class="dim"><div class="modal"><span class="x">✕</span><div style="font-weight:700">Quick survey (30 sec)</div><div style="font-size:11px;color:#888;margin:4px 0">Randomly selected members</div><div class="b" style="margin:4px 0">Very satisfied</div><div class="b" style="margin:4px 0">Neutral</div></div></div>`,
 spec:{Purpose:"Collect feedback / run lucky campaigns",Trigger:"Random / audience segment",Position:"Centered modal",Duration:"Requires close",Blocking:"Yes",Layer:"z50",Variants:"survey / lucky campaign",Source:"Campaign engine / CMS",a11y:"role=dialog"}},

/* ---------- In-page states ---------- */
skeleton:{g:"In-page states",name:"Loading Skeleton",note:"Skeleton placeholder while data loads (real shot: Slots).",
 render:()=>VL("skeleton shimmer")+`<div class="backdrop"><div class="sk" style="width:50%"></div><div class="sk"></div><div class="sk" style="width:80%"></div><div style="display:flex;gap:8px;margin-top:8px">${'xxx'.split('').map(()=>'<div class="sk" style="width:60px;height:48px"></div>').join('')}</div></div>`,
 spec:{Purpose:"Placeholder during load, reduces blank-screen anxiety",Trigger:"Data request in progress",Position:"Replaces that block",Duration:"Until data returns",Blocking:"No",Layer:"z0",Variants:"Card / list / grid",Source:"Frontend",a11y:"aria-busy=true"}},

empty:{g:"In-page states",name:"Empty State",note:"Guidance when there's no data (real shots: No Data / no promotion).",
 render:()=>`<div class="empty"><div class="e">📭</div><div style="margin:6px 0">No offer notifications yet</div><div class="b k" style="display:inline-block;max-width:140px">Browse offers</div></div>`,

const navEl=document.getElementById('nav');
function buildNav(active){
 let html='',lastG='';
 order.forEach(id=>{const c=C[id];if(c.g!==lastG){html+=`<div class="grp">${c.g}</div>`;lastG=c.g;}html+=`<button class="nav ${id===active?'on':''}" data-id="${id}">${c.name}</button>`;});
 navEl.innerHTML=html;navEl.querySelectorAll('.nav').forEach(b=>b.onclick=()=>render(b.dataset.id));
}
function render(id){
 CUR=id;
 const c=C[id];
 document.getElementById('ct').textContent=c.name;
 document.getElementById('cn').textContent=c.note;
 document.getElementById('stage').innerHTML=c.render();
 const s=c.spec;const keys=["Purpose","Trigger","Position","Duration","Blocking","Layer","Variants","Source","a11y"];
 document.getElementById('spec').innerHTML='<h2>Component Contract (9 columns)</h2><table>'+keys.map(k=>`<tr><td class="k">${k}</td><td>${s[k]||s[k.toLowerCase()]||'—'}</td></tr>`).join('')+'</table><div class="tmpl">These 9 columns are the definition template handed to IT: fill them in for every component for consistent implementation.</div>';
 buildNav(id);
 applyLang();
}

function applyLang(){_walk(n=>{if(!ORIG.has(n))ORIG.set(n,n.nodeValue);const o=ORIG.get(n),k=o.trim();n.nodeValue=(LANG==='zh'&&DICT[k])?o.replace(k,DICT[k]):o;});document.documentElement.lang=LANG;document.querySelectorAll('.langbar button').forEach(b=>b.classList.toggle('on',b.dataset.lang===LANG));}
