<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V9Bet · All-Pages Composition Wireframe</title>
<style>
  :root{--ink:#2b2b2b;--line:#c9c9c9;--line2:#9a9a9a;--muted:#8a8a8a;--paper:#fff;--bg:#ececed;--fill:#f4f4f5;--solid:#3a3a3a;--strike:#b56}
  *{box-sizing:border-box}
  body{margin:0;font:13px/1.5 -apple-system,"Noto Sans TC",Arial,sans-serif;color:var(--ink);background:var(--bg)}
  .app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
  aside{background:var(--paper);border-right:1px solid var(--line);padding:14px;overflow:auto;max-height:100vh}
  main{padding:18px;overflow:auto}
  h1{font-size:15px;margin:0 0 4px}.sub{color:var(--muted);font-size:12px;margin:0 0 10px}
  .gsel .grp{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:11px 0 4px}
  .gsel button{display:block;width:100%;text-align:left;border:1px solid transparent;background:none;border-radius:6px;padding:6px 8px;font-size:12.5px;cursor:pointer;color:#333}
  .gsel button:hover{background:var(--fill)}
  .gsel button.on{background:#e3e3e6;border-color:var(--line2);font-weight:600}
  .pagetitle{font-size:15px;font-weight:700;margin:2px 0}
  .pagenote{font-size:12px;color:var(--muted);margin-bottom:12px}
  .flow{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start}
  .arrow{align-self:center;color:var(--line2);font-size:18px;padding:0 1px}
  .ph{width:240px;border:2px solid var(--ink);border-radius:18px;background:#fff;padding:6px;box-shadow:0 4px 16px rgba(0,0,0,.1);position:relative}
  .ph .scr{min-height:420px;border:1px solid var(--line);border-radius:12px;padding:10px;overflow:hidden;position:relative}
  .ph.wide{width:320px}
  .cap{position:absolute;left:0;right:0;bottom:-18px;text-align:center;font-size:10px;color:var(--muted)}
  .stepnum{position:absolute;left:-8px;top:-8px;width:22px;height:22px;border-radius:50%;background:var(--solid);color:#fff;font-size:11px;display:grid;place-items:center;font-weight:700;z-index:2}
  .bar{display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:13px;margin-bottom:8px}
  .bar .l,.bar .r{color:var(--muted);font-weight:400}
  .stp{text-align:center;color:var(--muted);font-size:11px;margin:-3px 0 8px}
  .f{border:1px dashed var(--line2);border-radius:8px;padding:8px 10px;color:var(--muted);margin:6px 0;display:flex;justify-content:space-between;background:var(--fill);font-size:12px}
  .f small{color:#b0b0b0}
  .row{display:flex;gap:7px}.row>*{flex:1}
  .seg{display:flex;border:1px solid var(--line2);border-radius:8px;overflow:hidden;margin:6px 0}
  .seg span{flex:1;text-align:center;padding:6px;font-size:11px;color:var(--muted);border-right:1px solid var(--line)}
  .seg span:last-child{border:0}.seg span.on{background:var(--solid);color:#fff}
  .opt{border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin:5px 0;display:flex;gap:8px;align-items:center;font-size:12px}
  .opt.sel{border-color:var(--solid);border-width:2px}
  .dot{width:15px;height:15px;border:1px solid var(--line2);border-radius:50%;flex:0 0 15px}.dot.on{border:5px solid var(--solid)}
  .sq{width:15px;height:15px;border:1px solid var(--line2);border-radius:3px;flex:0 0 15px}.sq.on{background:var(--solid)}
  .cta{background:var(--solid);color:#fff;text-align:center;border-radius:18px;padding:9px;margin:10px 0 4px;font-weight:600;font-size:12px}
  .cta.gh{background:#fff;color:var(--muted);border:1px solid var(--line2)}
  .cta.dis{background:#cfcfcf;color:#fff}
  .cta.sm{padding:7px;border-radius:8px;margin:6px 0}
  .box{border:1px dashed var(--line2);border-radius:8px;background:var(--fill);color:#9a9a9a;display:grid;place-items:center;text-align:center;font-size:10.5px;padding:8px;margin:6px 0}
  .card{border:1px solid var(--line);border-radius:9px;padding:9px;margin:6px 0}
  .amt{text-align:center;font-size:21px;font-weight:800;margin:3px 0}.amt small{display:block;font-size:10.5px;font-weight:400;color:var(--muted)}
  .prog{height:8px;border-radius:5px;background:#e3e3e3;overflow:hidden;margin:4px 0}.prog i{display:block;height:100%;background:var(--solid)}
  .pl{font-size:10px;color:var(--muted);display:flex;justify-content:space-between}
  .chips{display:flex;gap:5px;flex-wrap:wrap;margin:5px 0}
  .chip{border:1px solid var(--line);border-radius:13px;padding:2px 8px;font-size:10px;color:#666}.chip.on{background:var(--solid);color:#fff;border-color:var(--solid)}
  .scrollrow{display:flex;gap:5px;overflow:hidden}
  .tile{flex:0 0 60px;height:48px;border:1px dashed var(--line2);border-radius:6px;background:var(--fill);display:grid;place-items:center;color:#b0b0b0;font-size:9px;text-align:center}
  .gridP{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin:5px 0}
  .gi{border:1px dashed var(--line2);border-radius:6px;background:var(--fill);height:40px;display:grid;place-items:center;color:#b0b0b0;font-size:10px;text-align:center}
  .gi3{grid-template-columns:repeat(3,1fr)}
  .li{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin:5px 0;font-size:12px}
  .li .ic{width:22px;height:22px;border:1px solid var(--line2);border-radius:50%;display:grid;place-items:center;font-size:10px;color:var(--muted);flex:0 0 22px}
  .li .g{flex:1;margin:0 8px}.li .g small{display:block;color:var(--muted);font-size:10px}
  .marq{border:1px solid var(--line);border-radius:5px;background:var(--fill);padding:4px 8px;font-size:10px;color:#666;white-space:nowrap;overflow:hidden;margin:5px 0}
  .bub{max-width:80%;border:1px solid var(--line);background:var(--fill);border-radius:10px;padding:7px 9px;margin:5px 0;font-size:11px}
  .bub.me{margin-left:auto;background:#e3e3e6;border-color:var(--line2)}
  .tag{display:inline-block;font-size:9px;border:1px solid var(--line2);border-radius:3px;padding:0 5px;color:#666}
  .tag.k{background:var(--solid);color:#fff;border-color:var(--solid)}
  .badge{font-size:9px;border:1px solid var(--line2);border-radius:3px;padding:0 5px;color:var(--muted);margin-left:4px}
  .badge.req{border-color:var(--strike);color:var(--strike)}
  .err{border:1px solid #c98;background:#fbf2ef;color:#a55;border-radius:7px;padding:7px 9px;font-size:11px;margin:5px 0}
  .pop{position:absolute;left:12px;right:12px;bottom:16px;border:2px solid var(--solid);border-radius:10px;background:#fff;padding:9px;box-shadow:0 6px 18px rgba(0,0,0,.2);font-size:10.5px}
  .tog{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:8px;padding:7px 10px;margin:5px 0;font-size:12px}
  .sw{width:34px;height:19px;border-radius:10px;border:1px solid var(--line2);position:relative;flex:0 0 34px}
  .sw i{position:absolute;top:2px;width:13px;height:13px;border-radius:50%;background:#fff;border:1px solid var(--line2)}
  .sw.on{background:var(--solid)}.sw.on i{right:2px}.sw.off i{left:2px}
  .ann{border-left:3px solid var(--solid);background:#fafafa;padding:7px 10px;margin:8px 0;font-size:11.5px;border-radius:0 6px 6px 0;max-width:820px}
  .ann.fix{border-left-color:var(--strike)}
  .ann b{color:#222}.strike{text-decoration:line-through;color:var(--strike)}
  .leg{display:flex;gap:8px;margin:5px 0;font-size:11.5px}
  .leg .n{width:17px;height:17px;flex:0 0 17px;border-radius:50%;background:var(--solid);color:#fff;font-size:9px;display:grid;place-items:center;font-weight:700}
  .leg small{display:block;color:var(--muted);font-size:10px}
  aside h2{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:12px 0 5px}
</style>
</head>
<body>
<div class="app">
  <aside>
    <h1>V9Bet All-Pages Composition</h1>
    <p class="sub">Current site→optimized · Grayscale no UI · Labels=module/docx</p>
    <div class="gsel" id="gsel"></div>
    <div id="legbox"></div>
  </aside>
  <main>
    <div id="pt" class="pagetitle"></div>
    <div id="pn" class="pagenote"></div>
    <div id="canvas"></div>
  </main>
</div>

<script>
const N=n=>`<span class="stepnum">${n}</span>`;
const P=(num,inner,cap='',wide=false)=>`<div class="ph ${wide?'wide':''}">${num?N(num):''}<div class="scr">${inner}</div>${cap?`<div class="cap">${cap}</div>`:''}</div>`;
const A=()=>`<div class="arrow">→</div>`;
const PLUS=()=>`<div class="arrow">＋</div>`;
const BAR=(t,l='←',r='')=>`<div class="bar"><span class="l">${l}</span>${t}<span class="r">${r}</span></div>`;
const F=(l,s='')=>`<div class="f"><span>${l}</span>${s?`<small>${s}</small>`:''}</div>`;
const OPT=(t,sel=false,k='dot')=>`<div class="opt ${sel?'sel':''}"><span class="${k} ${sel?'on':''}"></span><span style="flex:1">${t}</span></div>`;
const CTA=(t,m='')=>`<div class="cta ${m}">${t}</div>`;
const BOX=(t)=>`<div class="box">${t}</div>`;
const LI=(l,r='›',ic='',s='')=>`<div class="li">${ic?`<span class="ic">${ic}</span>`:''}<span class="g">${l}${s?`<small>${s}</small>`:''}</span><span>${r}</span></div>`;
const SEG=(o,a)=>`<div class="seg">${o.map((x,i)=>`<span class="${i===a?'on':''}">${x}</span>`).join('')}</div>`;
const PROG=(p,l='',r='')=>`<div class="prog"><i style="width:${p}%"></i></div><div class="pl"><span>${l}</span><span>${r}</span></div>`;
const TOG=(l,on)=>`<div class="tog"><span style="flex:1">${l}</span><span class="sw ${on?'on':'off'}"><i></i></span></div>`;
const BUB=(t,me=false)=>`<div class="bub ${me?'me':''}">${t}</div>`;
const ANN=(t,fix=false)=>`<div class="ann ${fix?'fix':''}">${t}</div>`;
const LEG=arr=>'<h2>Block→Module</h2>'+arr.map(x=>`<div class="leg"><span class="n">${x[0]}</span><div><b>${x[1]}</b><small>${x[2]}</small></div></div>`).join('');

/* ============ Entry / Sign-up ============ */
function prelogin(){
 const m=BAR('','☰','Login / Sign Up')+`<div class="marq">🎏 Lucky-themed welcome · Live promo ticker…</div>`+BOX('Hero Banner / Carousel')+`<div style="font-size:11px;font-weight:700;margin:6px 0 2px">Product shortcuts</div>`+`<div class="gridP gi3">${['Sports','Live','Slots','Lottery','Cards','More'].map(x=>`<div class="gi">${x}</div>`).join('')}</div>`+`<div class="marq">🏆 Live winners feed (social buzz)</div>`+CTA('Sign Up & Claim Newcomer Gift')+`<div style="text-align:center;font-size:11px;color:#666">Already a member? <b>Login</b></div>`;
 return ANN('<b>docx59/58:</b> Desktop left menu→<b>top menu</b>; lucky-themed welcome; add live-winners social buzz. Pre-login also shows product shortcuts and sign-up CTA.')+
   `<div class="flow">${P(1,m,'Pre-login Home (Mobile)')}</div>`;
}
function authflow(){
 const login=BAR('Login','✕')+BOX('V9 Logo')+`<div style="display:flex;justify-content:center;gap:14px;margin:4px 0 2px">${['G','LINE','X'].map(t=>`<span style="width:30px;height:30px;border:1px solid #bbb;border-radius:50%;display:inline-grid;place-items:center;font-size:${t==='LINE'?'7px':'11px'};font-weight:700;color:#777;background:#fff;position:relative">${t}${t==='G'?'<i style="position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-style:normal;font-size:7px;border:1px solid #666;border-radius:3px;padding:0 3px;background:#fff;white-space:nowrap">last used</i>':''}</span>`).join('')}</div>`+`<div style="text-align:center;font-size:10px;color:#888;margin:2px 0">— or login with —</div>`+F('Email / Phone number')+F('Password')+SEG(['Password','PIN','Biometric'],0)+CTA('Login')+`<div style="text-align:center;font-size:11px;color:#666"><b>Forgot password?</b></div>`;
 const method=BAR('Choose verification method')+`<div class="stp">Selectable when multiple are linked</div>`+OPT('📱 V9 App push',true)+OPT('💬 Social message (first time)')+OPT('📨 SMS')+OPT('✉️ Email')+CTA('Send code');
 const forgot=BAR('Account recovery')+`<div class="stp">Recover by matching existing info</div>`+F('Registered phone / recovery Email')+F('Any password you used before')+BOX('Match by one past password + basic info')+CTA('Submit for matching');
 return ANN('<b>Current site:</b> Account ID + password only. <b>docx15–17 changes:</b> multiple verification methods, PIN/biometric, recovery by matching past passwords.')+
   `<div class="flow">${P(6,login,'Login')}${PLUS()}${P(0,method,'Verification method (15)')}${PLUS()}${P(0,forgot,'Forgot/Recovery (17)')}</div>`;
}
function signup(){
 const su=BAR('Sign Up','✕')+`<div class="stp">Phone (default) | Email tabs · digits→TH/VN country code</div>`+SEG(['📱 Phone number','✉️ Email'],0)+F('Phone number','Required')+F('Password','👁')+`<div class="opt"><span class="sq"></span><span style="flex:1">21+ & agree to terms</span></div>`+CTA('Sign Up','dis')+`<div style="text-align:center;font-size:10px;color:#888;margin:7px 0 3px">— or continue with —</div>`+`<div style="display:flex;justify-content:center;gap:14px;margin:3px 0 5px">${['G','LINE','X'].map(t=>`<span style="width:30px;height:30px;border:1px solid #bbb;border-radius:50%;display:inline-grid;place-items:center;font-size:${t==='LINE'?'7px':'11px'};font-weight:700;color:#777;background:#fff">${t}</span>`).join('')}</div>`+`<div style="font-size:10.5px;color:#999;margin:4px 2px">＊Phone→OTP · email→inbox code · social (G/LINE/X)→no OTP, straight to welcome</div>`+`<div style="text-align:center;font-size:11px;color:#666">Already have an account? <b>Login</b></div>`;
 const otp=BAR('Verify Phone Number','✕')+`<div class="stp">We sent code verification to 091***233</div>`+`<div style="display:flex;gap:5px;justify-content:center;margin:12px 0">${'______'.split('').map((_,i)=>`<span style="width:30px;height:38px;border:${i===0?2:1}px solid ${i===0?'#3a3a3a':'#9a9a9a'};border-radius:6px;display:inline-grid;place-items:center;color:#aaa">_</span>`).join('')}</div>`+`<div style="text-align:center;font-size:10px;color:#888;margin:4px 0">Resent code in <b>00:32</b> · 3rd resend → 03:00</div>`+`<div class="err">Invalid OTP entered</div>`+CTA('Verify');
 return ANN('<b>Current site→change:</b> <span class="strike">Account ID + password + currency radio</span> → phone OTP as primary; currency moved down to new-customer wizard; shared OTP component (Email/SMS · 32s resend · 3rd→03:00; WhatsApp fallback deferred to phase 2).')+
   `<div class="flow">${P(1,su,'Sign Up')}${A()}${P(2,otp,'OTP (fail→WhatsApp)')}${A()}${BOX('Hand off to new-customer wizard')}</div>`;
}
function wiz(){
 const prog=n=>`<div class="prog"><i style="width:${n}%"></i></div>`;
 const a=BAR('Verify phone')+`<div class="stp">OTP success</div>`+BOX('✓ Verified<br>Go straight to setup (no home detour)')+CTA('Start setup');
 const b=BAR('Setup overview')+`<div class="stp">Finish required items first</div>`+['Currency ★Required','Face ID ★app','Notifications','Profile + bank','Email Optional*','Password/PIN'].map((x,i)=>LI(x,'›',i+1)).join('')+BOX('…9 steps total');
 const c=BAR('Currency ★Required')+prog(11)+OPT('🇻🇳 VND <small style="color:#b0b0b0">USDT ok</small>',true)+OPT('🇹🇭 THB <small style="color:#b0b0b0">USDT ok</small>')+`<div style="font-size:10px;color:#999;margin:4px 2px">＊USDT wrapped inside VND/THB (deposit/withdraw, live rate)</div>`+CTA('Confirm');
 const d=BAR('Profile + payout')+prog(44)+BOX('★ Move profile/bank needed for<br>deposit up to here')+F('Name')+SEG(['Bank','USDT'],0)+F('Bank ▾')+F('Account no.')+CTA('Save');
 const e=BAR('🎉 Welcome aboard','')+prog(100)+`<div class="stp">Account ready + exclusive offer</div>`+`<div class="card"><b>First Deposit 100%</b><div style="font-size:10px;color:#888">churn x10</div>${CTA('Claim now','sm')}</div>`+CTA('Go to deposit');
 return ANN('<b>Main flow (docx83–95):</b> OTP→setup wizard (progress + required-item gating)→welcome + offer→route to deposit.')+
   `<div class="flow">${P(1,a,'OTP success')}${A()}${P(2,b,'Overview')}${A()}${P(3,c,'Required')}${A()}${P(4,d,'Profile moved earlier★')}${A()}${P(5,e,'Welcome')}</div>`+
   ANN('<b>Key:</b> Step 4 = profile/bank that the current site stalls on at deposit, moved here → zero-friction deposit.',true);
}

/* ============ Account ============ */
function account(){
 const m=BAR('My Account','←','⚙️')+`<div class="card"><div style="display:flex;justify-content:space-between"><div><b>Member T99WEB0004</b><div style="font-size:10px;color:#888">VIP1 · VND</div></div><span class="tag">Verified</span></div></div>`+`<div class="amt">₫ 1,250,000<small>Main Wallet</small></div>`+`<div class="row">${CTA('Deposit','sm')}${CTA('Withdraw','sm gh')}</div>`+LI('Profile & Preferences','›','👤')+LI('Account Security','›','🔒')+LI('KYC','Pending ›','🪪')+LI('Account Status','Active ›','🟢')+LI('Statement','›','📄');
 return ANN('<b>Current site:</b> username = back-office random ID "T99WEB0004" (confirms docx97, editable). <b>docx21/24:</b> central entry for each setting.')+
   `<div class="flow">${P(0,m,'Account Home')}</div>`;
}
function profile(){
 const m=BAR('Profile & Preferences')+LI('Username','Editable ›')+LI('Face ID','Enabled ›')+LI('Theme','Dark ›')+LI('Time zone','GMT+8 ›')+LI('Language','EN ›')+LI('Notifications','›')+LI('Account recovery Email','Add ›')+LI('Product preferences','›');
 return ANN('<b>docx24:</b> Face ID/theme/time zone/language/notifications/recovery Email/product preferences (affect sorting & recommendations). Username editable (97).')+
   `<div class="flow">${P(0,m,'Profile & Preferences')}</div>`;
}
function statuskyc(){
 const st=BAR('Account Status')+`<div class="card"><div style="font-size:18px;font-weight:700">🟢 Active</div><div style="font-size:11px;color:#888">Normal use</div></div>`+`<div class="err">🔴 Blacklisted → restricted, can appeal</div>`+CTA('Contact support','gh');
 const kyc=BAR('KYC verification')+SEG(['To upload','In review','Passed','Rejected'],0)+BOX('📷 ID front')+BOX('📷 ID back')+BOX('🤳 Selfie holding ID')+CTA('Upload & submit');
 const sec=BAR('Account Security')+`<div style="font-size:11px;font-weight:700">Logged-in devices</div>`+LI('iPhone·this device','Current ›','📱')+LI('Chrome·Win','2 days ago ›','💻')+`<div style="font-size:11px;font-weight:700;margin-top:6px">Login history</div>`+BOX('06-19 10:22 · IP 1.2.3.4 · Taipei')+CTA('Log out other devices','gh');
 return ANN('<b>docx25–27:</b> account status (Active/Suspend/Blacklist), KYC (risk-control triggered + document upload), security (devices/history/IP/logout).')+
   `<div class="flow">${P(0,st,'Account Status (25)')}${PLUS()}${P(0,kyc,'KYC (26)')}${PLUS()}${P(0,sec,'Account Security (27)')}</div>`;
}

/* ============ Wallet / Banking ============ */
function wal(){
 const main=BAR('My Wallet','←','Details')+`<div class="card" style="background:var(--fill);border-style:dashed"><div class="amt">₫ 1,250,000<small>Main Wallet · deposit churn x1</small></div>${CTA('Transfer/Withdraw','sm gh')}</div>`+`<div style="font-size:11px;font-weight:700;margin:6px 0 2px">Bonus wallets (separated by product)</div>`+`<div class="card"><div style="display:flex;justify-content:space-between"><b>Sports bonus</b><span>₫1,000,000</span></div>${PROG(40,'churn x10','40%·per-bet limit ₫10')}</div>`+`<div class="card"><div style="display:flex;justify-content:space-between"><b>Live bonus</b><span>₫500,000</span></div>${PROG(0,'churn x10','0%')}</div>`+BOX('Churn done→to main · Wiped out→reset');
 const pick=BAR('Pick betting wallet','✕')+`<div class="stp">Choose before launching game</div>`+OPT('Main Wallet ₫1,250,000 (no limit)',true)+OPT('Sports bonus ₫1,000,000 (₫10/bet)')+BOX('Pick bonus: per-bet limit, winnings to bonus')+CTA('Enter game with this wallet');
 return ANN('<b>docx28–31:</b> main + bonus wallets separated; pick wallet before betting; bonus has per-bet limit, winnings go to bonus until churn is done, then to main.')+
   `<div class="flow">${P(0,main,'Wallet Overview')}${PLUS()}${P(0,pick,'Pick wallet before betting (30)')}</div>`;
}
function dep(){
 const s1=BAR('Banking','✕','?')+SEG(['Deposit','Withdrawal'],0)+`<div style="font-size:11px;font-weight:700;margin:6px 0 3px">Payment method</div>`+`<div class="gridP">${['Bank','QR','USDT','e-Wallet'].map(x=>`<div class="gi">${x}</div>`).join('')}</div>`+BOX('Profile/bank already set in wizard<br>→ no more Complete Profile gate');
 const s2=BAR('Deposit')+SEG(['Bank','USDT'],0)+`<div class="amt">₫ 0<small>Enter amount</small></div>`+`<div class="chips"><span class="chip">100k</span><span class="chip">500k</span><span class="chip">1M</span><span class="chip">Custom</span></div>`+F('Channel ▾ QR')+BOX('USDT→live rate 100U≈₫2.4M')+CTA('Next');
 const s3=BAR('Apply offer')+`<div class="stp">Shopee-style (optional)</div>`+OPT('First Deposit 100% (+₫1,000,000)',true)+OPT('Sports free bet ₫50')+OPT('Don\'t use')+CTA('Apply & check out');
