<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V9Bet · Full-Platform Wireframe (per full docx)</title>
<style>
  :root{--ink:#2b2b2b;--line:#c9c9c9;--line2:#9a9a9a;--muted:#8a8a8a;--paper:#fff;--bg:#ececed;--fill:#f3f3f4;--solid:#3a3a3a}
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,"Noto Sans TC",Arial,sans-serif;color:var(--ink);background:var(--bg)}
  .app{display:grid;grid-template-columns:280px 1fr 340px;min-height:100vh}
  aside{background:var(--paper);border-right:1px solid var(--line);padding:14px;overflow:auto;max-height:100vh}
  main{padding:22px;display:flex;flex-direction:column;align-items:center;gap:12px}
  .spec{background:var(--paper);border-left:1px solid var(--line);padding:16px;overflow:auto;max-height:100vh}
  h1{font-size:15px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:12px;margin:0 0 12px}
  .nav{display:flex;gap:8px;align-items:center;border:1px solid transparent;border-radius:6px;padding:6px 8px;cursor:pointer;font-size:12.5px}
  .nav:hover{background:var(--fill)}
  .nav.active{background:#e3e3e6;border-color:var(--line2);font-weight:600}
  .nav .num{width:18px;height:18px;flex:0 0 18px;border:1px solid var(--line2);border-radius:50%;display:grid;place-items:center;font-size:10px;color:var(--muted)}
  .nav.active .num{background:var(--solid);color:#fff;border-color:var(--solid)}
  .group-title{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:13px 0 5px;font-weight:700}
  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}
  .btn{border:1px solid var(--line2);background:#fff;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer}
  .btn:hover{background:var(--fill)}
  .state-tabs{display:flex;gap:4px;border:1px solid var(--line);border-radius:8px;padding:3px;background:#fff;flex-wrap:wrap;max-width:520px}
  .state-tabs button{border:0;background:none;padding:5px 9px;border-radius:6px;font-size:11.5px;cursor:pointer;color:var(--muted)}
  .state-tabs button.on{background:var(--solid);color:#fff}
  .phone{width:378px;border:2px solid var(--ink);border-radius:26px;background:#fff;padding:8px;box-shadow:0 6px 24px rgba(0,0,0,.12)}
  .notch{height:16px;display:flex;justify-content:center}
  .notch::after{content:"";width:110px;height:14px;background:var(--ink);border-radius:0 0 10px 10px}
  .screen{height:680px;overflow:auto;border:1px solid var(--line);border-radius:16px;padding:16px;background:#fff}
  .screen::-webkit-scrollbar{width:5px}.screen::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .bar{display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:15px;margin:0 0 12px;color:#222}
  .bar .l,.bar .r{color:var(--muted);font-weight:400;font-size:18px;min-width:24px}
  .bar .r{text-align:right}
  .scr-step{text-align:center;color:var(--muted);font-size:12px;margin:-6px 0 12px}
  .field{border:1px dashed var(--line2);border-radius:9px;padding:12px 13px;color:var(--muted);margin:9px 0;display:flex;justify-content:space-between;align-items:center;background:var(--fill);font-size:13px}
  .field small{color:#b0b0b0}
  .row{display:flex;gap:9px}.row>*{flex:1}
  .opt{border:1px solid var(--line);border-radius:9px;padding:11px 13px;margin:7px 0;display:flex;align-items:center;gap:11px;font-size:13px}
  .opt.sel{border-color:var(--solid);border-width:2px}
  .dot{width:17px;height:17px;border:1px solid var(--line2);border-radius:50%;flex:0 0 17px}
  .dot.on{border-color:var(--solid);border-width:5px}
  .sq{width:17px;height:17px;border:1px solid var(--line2);border-radius:4px;flex:0 0 17px}
  .sq.on{background:var(--solid)}
  .ph{border:1px dashed var(--line2);border-radius:9px;display:grid;place-items:center;color:#b6b6b6;background:var(--fill);margin:9px 0;font-size:12px;text-align:center;padding:8px}
  .cta{background:var(--solid);color:#fff;text-align:center;border-radius:22px;padding:13px;margin:14px 0 6px;font-weight:600;font-size:14px}
  .cta.ghost{background:#fff;color:var(--muted);border:1px solid var(--line2)}
  .cta.disabled{background:#cfcfcf;color:#fff}
  .cta.sm{padding:9px;border-radius:8px;margin:8px 0}
  .link{text-align:center;color:#666;font-size:12.5px;margin-top:7px}
  .link b{color:var(--ink);text-decoration:underline}
  .li{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:9px;padding:11px 13px;margin:7px 0;font-size:13px;background:#fff}
  .li .ic{width:30px;height:30px;border:1px solid var(--line);border-radius:7px;flex:0 0 30px;display:grid;place-items:center;color:#aaa;font-size:13px;background:var(--fill)}
  .li .g{flex:1}.li .g small{display:block;color:var(--muted);font-size:11px}
  .li .rt{color:var(--muted);font-size:12px;text-align:right}
  .card{border:1px solid var(--line);border-radius:11px;padding:13px;margin:9px 0;background:#fff}
  .card.fill{background:var(--fill);border-style:dashed}
  .ctitle{font-weight:700;font-size:13px;margin-bottom:6px}
  .seg{display:flex;border:1px solid var(--line2);border-radius:9px;overflow:hidden;margin:9px 0}
  .seg button{flex:1;border:0;background:#fff;padding:9px;font-size:12.5px;cursor:pointer;color:var(--muted);border-right:1px solid var(--line)}
  .seg button:last-child{border-right:0}
  .seg button.on{background:var(--solid);color:#fff}
  .tag{display:inline-block;font-size:10px;border:1px solid var(--line2);border-radius:4px;padding:1px 6px;color:var(--muted);vertical-align:middle}
  .tag.k{background:var(--solid);color:#fff;border-color:var(--solid)}
  .tag.req{border-color:#b56;color:#b56}
  .badge{display:inline-block;font-size:10px;border:1px solid var(--line2);border-radius:4px;padding:1px 6px;color:var(--muted);margin-left:6px;vertical-align:middle}
  .badge.req{border-color:#b56;color:#b56}
  .amt{text-align:center;font-size:30px;font-weight:800;letter-spacing:.5px;margin:6px 0;color:#222}
  .amt small{display:block;font-size:12px;font-weight:400;color:var(--muted)}
  .prog{height:9px;border-radius:6px;background:#e3e3e3;overflow:hidden;margin:6px 0}
  .prog i{display:block;height:100%;background:var(--solid)}
  .pl{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;margin-top:3px}
  .bubble{max-width:78%;border-radius:12px;padding:9px 12px;margin:6px 0;font-size:12.5px;border:1px solid var(--line);background:var(--fill)}
  .bubble.me{margin-left:auto;background:#e3e3e6;border-color:var(--line2)}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:9px 0}
  .gi{border:1px solid var(--line);border-radius:9px;padding:10px 4px;text-align:center;font-size:11px;color:#555;background:#fff}
  .gi .gic{height:30px;display:grid;place-items:center;color:#aaa;font-size:18px}
  .err{border:1px solid #c98;background:#fbf2ef;color:#a55;border-radius:8px;padding:9px 11px;font-size:12px;margin:8px 0}
  .ok{border:1px solid #9bc;background:#eef5fb;color:#467;border-radius:8px;padding:9px 11px;font-size:12px;margin:8px 0}
  .hint{font-size:11.5px;color:var(--muted);margin:6px 2px}
  .tog{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:9px;padding:10px 13px;margin:7px 0;font-size:13px}
  .sw{width:38px;height:21px;border-radius:11px;border:1px solid var(--line2);position:relative;flex:0 0 38px}
  .sw i{position:absolute;top:2px;width:15px;height:15px;border-radius:50%;background:#fff;border:1px solid var(--line2)}
  .sw.on{background:var(--solid)}.sw.on i{right:2px;border-color:var(--solid)}.sw.off i{left:2px}
  .dots{display:flex;gap:6px;justify-content:center;margin:12px 0}
  .dots i{width:7px;height:7px;border-radius:50%;background:var(--line2)}.dots i.on{background:var(--solid);width:18px;border-radius:4px}
  .notelist{font-size:12px}.notelist .nl{border-left:3px solid var(--line2);padding:4px 0 4px 10px;margin:7px 0;color:#444}
  .notelist .nl b{color:#222}
  /* overlay popup */
  .pop{position:relative;border:2px solid var(--solid);border-radius:12px;padding:14px;margin:10px 0;background:#fff;box-shadow:0 6px 18px rgba(0,0,0,.12)}
  .pop .x{position:absolute;right:10px;top:8px;color:var(--muted)}
  .toast{border:1px solid var(--line2);border-radius:9px;padding:9px 12px;margin:8px 0;background:#fff;font-size:12px;display:flex;gap:8px;align-items:center}
  .marquee{border:1px solid var(--line);border-radius:6px;padding:6px 10px;font-size:11.5px;color:#555;background:var(--fill);margin:8px 0;overflow:hidden;white-space:nowrap}
  /* spec */
  .spec h2{font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:16px 0 6px}
  .spec h2:first-child{margin-top:0}
  .spec ul{margin:0;padding-left:15px}.spec li{margin:4px 0;font-size:12px}
  .stlist{display:flex;flex-wrap:wrap;gap:5px}
  .pill{font-size:10.5px;border:1px solid var(--line2);border-radius:11px;padding:2px 8px;background:var(--fill)}
  .api{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;background:var(--fill);border:1px solid var(--line);border-radius:6px;padding:8px;white-space:pre-wrap;color:#555}
  .srcline{font-size:10.5px;color:#999}
  .legend{font-size:10.5px;color:var(--muted);border-top:1px solid var(--line);margin-top:12px;padding-top:9px}
  .socrow{display:flex;justify-content:center;gap:26px;margin:12px 0 4px}
  .socrow .sic{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
  .socrow .c{width:46px;height:46px;border:1px solid var(--line2);border-radius:50%;display:grid;place-items:center;font-size:14px;font-weight:700;color:var(--muted);background:#fff}
  .socrow small{font-size:10px;color:var(--muted)}
  .ccpop{border:1px solid var(--line2);border-radius:10px;background:#fff;box-shadow:0 6px 18px rgba(0,0,0,.08);margin:-4px 0 10px;overflow:hidden}
  .ccpop .cc{padding:11px 14px;font-size:13px;display:flex;align-items:center;gap:8px;color:#444}
  .ccpop .cc.on{background:var(--fill);font-weight:700}
  .ccpop .cc small{margin-left:auto;color:#b0b0b0}
  .mtabs{display:flex;border:1px solid var(--line2);border-radius:10px;overflow:hidden;margin:10px 0;font-size:12px;text-align:center}
  .mtabs span{flex:1;padding:8px 0;color:var(--muted);background:var(--fill)}
  .mtabs span.on{background:#fff;color:#222;font-weight:700;box-shadow:inset 0 -2px 0 var(--solid)}
  .socrow .sic{position:relative}
  .socrow .lu{position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-size:8px;border:1px solid var(--solid);color:var(--solid);background:#fff;border-radius:4px;padding:0 4px;white-space:nowrap}
  .prog3{display:flex;gap:5px;margin:8px 0 2px}
  .prog3 .p{flex:1;font-size:9px;text-align:center;padding:4px 0;border:1px solid var(--line2);border-radius:7px;color:var(--muted);background:var(--fill)}
  .prog3 .p.on{background:var(--solid);border-color:var(--solid);color:#fff;font-weight:700}
  .prog3 .p.done{border-color:var(--solid);color:var(--solid)}
  .grp{font-size:10.5px;font-weight:700;color:#555;margin:10px 0 2px;display:flex;align-items:center;gap:6px}
</style>
</head>
<body>
<div class="app">
  <aside>
    <h1>V9Bet Full-Platform Wireframe</h1>
    <p class="sub">Per full docx "New customers sign up flow" · all 117 items covered · grayscale low-fidelity</p>
    <div id="nav"></div>
    <div class="legend">
      <span class="badge req">Required</span> mandatory · <span class="badge">app only</span> App only<br>
      The spec panel on the right notes the matching docx line numbers (src).<br>
      Pure rules/principles are on the final "Rules & Notes" page.
    </div>
  </aside>
  <main>
    <div class="toolbar">
      <button class="btn" id="prev">←</button>
      <div class="state-tabs" id="states"></div>
      <button class="btn" id="next">→</button>
    </div>
    <div class="phone"><div class="notch"></div><div class="screen" id="screen"></div></div>
    <div class="hint" id="bread"></div>
  </main>
  <div class="spec" id="spec"></div>
</div>

<script>
/* ---------- primitives ---------- */
const BAR=(t,l='←',r='')=>`<div class="bar"><span class="l">${l}</span><span>${t}</span><span class="r">${r}</span></div>`;
const STEP=t=>`<div class="scr-step">${t}</div>`;
const F=(l,s='')=>`<div class="field"><span>${l}</span>${s?`<small>${s}</small>`:''}</div>`;
const CTA=(t,m='')=>`<div class="cta ${m}">${t}</div>`;
const OPT=(t,sel=false,k='dot')=>`<div class="opt ${sel?'sel':''}"><span class="${k} ${sel?'on':''}"></span><span style="flex:1">${t}</span></div>`;
const LI=(l,r='›',ic='',sub='')=>`<div class="li">${ic?`<span class="ic">${ic}</span>`:''}<span class="g">${l}${sub?`<small>${sub}</small>`:''}</span><span class="rt">${r}</span></div>`;
const CARD=(h,t='',fill=false)=>`<div class="card ${fill?'fill':''}">${t?`<div class="ctitle">${t}</div>`:''}${h}</div>`;
const SEG=(o,a)=>`<div class="seg">${o.map((x,i)=>`<button class="${i===a?'on':''}">${x}</button>`).join('')}</div>`;
const PH=(t,h=90)=>`<div class="ph" style="height:${h}px">${t}</div>`;
const PROG=(p,l='',r='')=>`<div class="prog"><i style="width:${p}%"></i></div><div class="pl"><span>${l}</span><span>${r}</span></div>`;
const TOG=(l,on)=>`<div class="tog"><span style="flex:1">${l}</span><span class="sw ${on?'on':'off'}"><i></i></span></div>`;
const TAG=(t,k='')=>`<span class="tag ${k}">${t}</span>`;
const BADGE=(t,req=false)=>`<span class="badge ${req?'req':''}">${t}</span>`;
const LINK=t=>`<div class="link">${t}</div>`;
const AMT=(v,s='')=>`<div class="amt">${v}${s?`<small>${s}</small>`:''}</div>`;
const GRID=items=>`<div class="grid3">${items.map(x=>`<div class="gi"><div class="gic">${x[1]}</div>${x[0]}</div>`).join('')}</div>`;
const BUB=(t,me=false)=>`<div class="bubble ${me?'me':''}">${t}</div>`;
const DOTS=(a,n=3)=>`<div class="dots">${Array.from({length:n}).map((_,i)=>`<i class="${i===a?'on':''}"></i>`).join('')}</div>`;

/* ---------- screens ---------- */
const S=[
/* ===== 0 · Entry / Rules ===== */
{g:"0 · Entry/Rules",t:"Home (before login)",src:"58,59,54,32,02",states:["Default"],
 r:()=>BAR("V9BET","☰","Login/Sign Up")+
   `<div class="marquee">🎏 Lucky-ornament greeting · Marquee: this week's promos / system notices scrolling text…</div>`+
   PH("Hero Banner / Carousel",110)+
   `<div class="ctitle">Product shortcuts (Desktop uses top menu)</div>`+
   GRID([["Sports","⚽"],["Live","🃏"],["Slots","🎰"],["Lottery","🎟"],["Cards","♟"],["More","⋯"]])+
   CARD(LI("Sign up now for a welcome gift","›","🎁"),"")+
   LINK("Already a member? <b>Login</b>"),
 spec:{goal:"Before-login home: lucky-ornament greeting, top menu (Desktop), product shortcuts and cross-product traffic.",states:["before-login","RWD: Desktop top menu / Mobile hamburger","content controlled by CMS"],notes:["docx58 lucky-ornament greeting; 59 Desktop uses top menu; 54 product shortcuts cross-link; 02 some mobile modules framed in from desktop.","32 promo marquee scrolling text."]}},

{g:"0 · Entry/Rules",t:"Region/IP block",src:"09,12,18",states:["Geo block","Negative database"],
 r:(s)=>BAR("","",'')+PH("🚫",80)+
   `<div class="ctitle" style="text-align:center">${s===0?'Not available in your region':'This account/device is restricted'}</div>`+
   STEP(s===0?'Access restricted per Allowed IP / Pre-login rules':'Matched Negative Database; sign-up and login blocked')+
   CARD(`<div class="hint">Code: ${s===0?'GEO_BLOCKED':'NEG_DB_BLOCKED'}　Detected IP: xxx.xxx.xxx.xxx</div>`)+
   CTA("Contact Live Chat",'ghost'),
 spec:{goal:"Pre-checks: Allowed IP / Pre-login rules / Negative Database.",states:["geo blocked","negative DB block (sign-up/login)","VPN detection"],fields:["ip","geo","device_id","neg_db_hit"],notes:["docx09 Allowed IP; 12 Pre-login rules; 18 Negative Database controls whether sign-up/login is allowed."]}},

{g:"0 · Entry/Rules",t:"Language/Currency/Timezone",src:"10,11,13",states:["Language","Timezone"],
 r:(s)=>BAR("Region & display preferences")+
   (s===0?STEP("Choose language (shared with CMS translations)")+OPT("Traditional Chinese",true)+OPT("English")+OPT("Tiếng Việt")+OPT("ไทย")
         :STEP("Choose timezone")+OPT("GMT+8 Taipei/Singapore",true)+OPT("GMT+7 Bangkok/Jakarta")+OPT("Custom"))+
   CARD(F("Currency display ▾ VND"),"Currency")+CTA("Apply"),
 spec:{goal:"Pre-setup: language, timezone, currency display preferences.",states:["language","timezone","currency display"],fields:["language","timezone","currency"],notes:["docx10/11/13; language list shared with CMS translation module (60)."]}},

/* ===== 1 · Sign Up / Login ===== */
{g:"1 · Sign Up/Login",t:"Sign Up",src:"14,75-82",states:["Default","Phone detected → country code","Submittable","Captcha (conditional)","Email tab"],
 r:(s)=>BAR("Sign Up","✕")+STEP("Sign up with phone number or email")+
   `<div class="mtabs"><span class="${s===4?'':'on'}">📱 Phone number</span><span class="${s===4?'on':''}">✉️ Email</span></div>`+
   (s===4?F("Email address","Required")
   :s===1?`<div class="field" style="border-style:solid"><span><b>+66 ▾</b> &nbsp; 0812345678</span><small>phone detected</small></div>
   <div class="ccpop"><div class="cc on">🇹🇭 Thailand<small>+66 ✓</small></div><div class="cc">🇻🇳 Vietnam<small>+84</small></div></div>`
   :F("Phone number","Required"))+
   F("Password","👁 &nbsp; Required")+
   `<div class="opt"><span class="sq ${(s===2||s===3)?'on':''}"></span><span style="flex:1">I am 21+ and agree to the <b style="text-decoration:underline">Terms</b> and <b style="text-decoration:underline">Privacy Policy</b></span></div>`+
   (s===3?PH("hCaptcha (shown only when risk-triggered)",70):`<div class="hint">* ${s===4?'Email sign-up verifies via a code sent to the inbox.':s===1?'Digits → country-code picker pops up (TH +66 / VN +84).':'Phone → OTP. Pasting an email auto-switches to the Email tab. Captcha skipped by default.'}</div>`)+
   CTA("Sign Up",(s===2||s===3)?'':'disabled')+
   `<div class="hint" style="text-align:center">— or continue with —</div>`+
   `<div class="socrow"><div class="sic"><span class="c">G</span><small>Google</small></div><div class="sic"><span class="c" style="font-size:10px">LINE</span><small>LINE</small></div><div class="sic"><span class="c">X</span><small>X</small></div></div>`+
   `<div class="hint">* 3rd-party = icon entries only (Google / LINE / X), market-aware, via the stable auth domain; Apple/Facebook not offered (policy).</div>`+
   LINK("Already have an account? <b>Login here</b>"),
 spec:{goal:"Sign-up = phone (default tab) or email (tab switch) + password; digits in the phone tab pop the TH/VN country-code picker; 3rd-party via icon row Google / LINE / X.",states:["phone tab · disabled","phone detected → country-code picker (TH/VN)","email tab (code to inbox)","enabled after terms checked","Captcha conditional","loading","PHONE_EXISTS / EMAIL_EXISTS","INVALID_PHONE / WEAK_PASSWORD","social icon → Google/LINE/X branch"],fields:["identifier(email|phone)","country_code?(TH/VN, phone only)","password","accept_terms","captcha_token?","method(phone|email|google|line|x)"],api:"POST /register/start\n→ { identifier, country_code?, password, accept_terms }\n← { register_token, otp_sent }\nGET auth.&lt;stable&gt;/oauth/{provider} → session_token",notes:["docx76-82; 79 Captcha skippable thanks to OTP (phone path).","Tabs: Phone (default) | Email; pasting an email in the phone tab auto-switches. Digits → country-code picker (TH +66 / VN +84 only, default by locale/geo-IP).","Password is set at sign-up. Language / currency / referral deferred — account already exists after this page; referral auto-captured from ?ref= link (7-day manual window in Promotions), currency forced at setup Step 1 / first deposit intent, language auto by locale.","3rd-party = icons only: Google / LINE / X (Telegram removed 2026-07-15; Apple/Facebook excluded). Market-aware visibility.","Central auth domain solves mirror rotation; sign_up event carries method param (phone_otp|email|google|line|x)."]}},

{g:"1 · Sign Up/Login",t:"OTP verify",src:"81,49",states:["Waiting","Error","Fail→WhatsApp","Change channel"],
 r:(s)=>s===3?BAR("Choose OTP channel")+STEP("Not receiving? Pick another channel")+
   OPT("💬 Zalo ZNS <small style='color:#b0b0b0'>default · best reach VN</small>",true)+OPT("📨 SMS")+OPT("🟩 LINE <small style='color:#b0b0b0'>best reach TH</small>")+OPT("🟢 WhatsApp")+OPT("✉️ Email")+
   CTA("Resend via selected channel")
 :BAR("Verify phone")+STEP("Code sent via Zalo ZNS to +xx ****1234")+
   `<div style="display:flex;gap:7px;justify-content:center;margin:16px 0">${'_'.repeat(6).split('').map((_,i)=>`<span style="width:40px;height:50px;border:1px solid ${i===0?'#3a3a3a':'#9a9a9a'};border-width:${i===0?2:1}px;border-radius:8px;display:inline-grid;place-items:center;color:#aaa;font-size:18px">_</span>`).join('')}</div>`+

/* ---------- runtime ---------- */
let idx=0, st=0;
const navEl=document.getElementById('nav');
function buildNav(){
  let html='',lastG='';
  S.forEach((sc,i)=>{
    if(sc.g!==lastG){html+=`<div class="group-title">${sc.g}</div>`;lastG=sc.g;}
    html+=`<div class="nav ${i===idx?'active':''}" data-i="${i}"><span class="num">${i+1}</span>${sc.t}</div>`;
  });
  navEl.innerHTML=html;
  navEl.querySelectorAll('.nav').forEach(n=>n.onclick=()=>{idx=+n.dataset.i;st=0;draw();});
}
function draw(){
  const sc=S[idx];
  document.getElementById('screen').innerHTML=sc.r(st);
  const w=document.getElementById('states');
  w.innerHTML=sc.states.map((s,i)=>`<button class="${i===st?'on':''}" data-s="${i}">${s}</button>`).join('');
  w.querySelectorAll('button').forEach(b=>b.onclick=()=>{st=+b.dataset.s;draw();});
  document.getElementById('bread').textContent=`Screen ${idx+1}/${S.length} · ${sc.t}`;
  const sp=sc.spec;
  document.getElementById('spec').innerHTML=
    `<h2>Goal</h2><p style="font-size:12.5px;margin:0">${sp.goal}</p>`+
    `<div class="srcline" style="margin-top:6px">docx src: ${sc.src}</div>`+
    `<h2>States</h2><div class="stlist">${sp.states.map(x=>`<span class="pill">${x}</span>`).join('')}</div>`+
    (sp.fields?`<h2>Fields</h2><div class="stlist">${sp.fields.map(x=>`<span class="pill">${x}</span>`).join('')}</div>`:'')+
    (sp.api?`<h2>API / Data</h2><div class="api">${sp.api}</div>`:'')+
    (sp.notes?`<h2>Dev notes</h2><ul>${sp.notes.map(x=>`<li>${x}</li>`).join('')}</ul>`:'');
  buildNav();
}
document.getElementById('prev').onclick=()=>{if(idx>0){idx--;st=0;draw();}};
document.getElementById('next').onclick=()=>{if(idx<S.length-1){idx++;st=0;draw();}};
draw();
</script>
<script>
/* ---------- ✏️ 文字編輯模式：右下角開關，點字直接改；存 localStorage，重整 / 切畫面不會消失 ---------- */
(function(){
const FILE=location.pathname.split('/').pop()||'page';
const KEY='wfTextEdits:'+FILE;
const DYN=['screen','spec','bread'];                                   // draw() 重繪的區塊
const STATIC=[['aside h1','h1'],['aside .sub','sub'],['aside .legend','legend']]; // 靜態區塊
const dynKey=id=>id==='screen'?`d|${idx}|${st}|screen`:`d|${idx}|${id}`;
const nodes=el=>{const w=document.createTreeWalker(el,NodeFilter.SHOW_TEXT),a=[];let n;while(n=w.nextNode())a.push(n);return a};
const load=()=>{try{const d=JSON.parse(localStorage.getItem(KEY)||'{}');return{edits:d.edits||{},orig:d.orig||{}}}catch(e){return{edits:{},orig:{}}}};
const persist=d=>localStorage.setItem(KEY,JSON.stringify(d));
const fresh={};                                                        // 每個 key 的原始文字（重繪後快照）
function applyKey(el,k){const v=load().edits[k];if(!v)return;const ns=nodes(el);for(let i=0;i<Math.min(ns.length,v.length);i++)ns[i].nodeValue=v[i]}
function snapApply(el,k){if(!(k in fresh))fresh[k]=nodes(el).map(n=>n.nodeValue);applyKey(el,k)}
function record(el,k){
  const d=load(),cur=nodes(el).map(n=>n.nodeValue),o=fresh[k]||d.orig[k];
  if(o&&cur.length===o.length&&cur.every((t,i)=>t===o[i])){delete d.edits[k];delete d.orig[k]}
  else{d.edits[k]=cur;if(o&&!d.orig[k])d.orig[k]=o}
  persist(d);flash('已儲存 ✓')}
const _draw=draw;
draw=function(){_draw();DYN.forEach(id=>{const el=document.getElementById(id);if(el)snapApply(el,dynKey(id))})};
STATIC.forEach(([sel,k])=>{const el=document.querySelector(sel);if(el){snapApply(el,'s|'+k);el.addEventListener('input',()=>record(el,'s|'+k))}});
DYN.forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',()=>record(el,dynKey(id)))});
draw();                                                                // 載入時套用已存的修改
/* --- 編輯開關 --- */
let editing=false;
const plainOK=(()=>{const t=document.createElement('div');try{t.contentEditable='plaintext-only'}catch(e){return false}return t.contentEditable==='plaintext-only'})();
const editables=()=>DYN.map(id=>document.getElementById(id)).concat(STATIC.map(([sel])=>document.querySelector(sel))).filter(Boolean);
function setEditing(on){editing=on;
  editables().forEach(el=>{if(on){el.setAttribute('contenteditable',plainOK?'plaintext-only':'true');el.setAttribute('spellcheck','false')}else{el.removeAttribute('contenteditable')}});
  document.body.toggleAttribute('data-editing',on);
  const b=document.getElementById('eb-toggle');b.textContent=on?'✅ 完成':'✏️ 編輯文字';b.classList.toggle('on',on);
  flash(on?'點畫面上的字直接修改（自動儲存）':'')}
document.addEventListener('beforeinput',e=>{if(editing&&!plainOK&&(e.inputType==='insertParagraph'||e.inputType==='insertLineBreak'))e.preventDefault()},true);
/* --- 工具列 --- */
const css=document.createElement('style');css.textContent=`
#editbar{position:fixed;right:14px;bottom:14px;z-index:9999;display:flex;gap:6px;align-items:center;background:#fff;border:1px solid #d0d3d8;border-radius:10px;padding:6px 8px;box-shadow:0 4px 18px rgba(0,0,0,.14);font:12px/1.4 -apple-system,"Noto Sans TC",Arial,sans-serif}
#editbar button{font:inherit;border:1px solid #d0d3d8;background:#fff;border-radius:7px;padding:4px 9px;cursor:pointer;color:#333}
#editbar button:hover{border-color:#19c37d;color:#0f8a5f}
#editbar #eb-toggle.on{background:#19c37d;border-color:#19c37d;color:#fff}
#eb-msg{color:#0f8a5f;font-size:11px;max-width:170px}
body[data-editing] [contenteditable]{outline:1.5px dashed #19c37d;outline-offset:3px;border-radius:3px;cursor:text}
body[data-editing] [contenteditable]:focus{outline-style:solid}`;
document.head.appendChild(css);
const bar=document.createElement('div');bar.id='editbar';
bar.innerHTML=`<button id="eb-toggle" title="開啟後直接點畫面文字修改，自動儲存在此瀏覽器">✏️ 編輯文字</button><button id="eb-copy" title="複製修改清單（原文 → 新文），可貼給 Claude 寫回 HTML">📋 複製修改</button><button id="eb-reset" title="清除此頁所有文字修改並還原">↺ 還原</button><span id="eb-msg"></span>`;
document.body.appendChild(bar);
document.getElementById('eb-toggle').onclick=()=>setEditing(!editing);
document.getElementById('eb-reset').onclick=()=>{if(confirm('還原此頁所有文字修改？')){localStorage.removeItem(KEY);location.reload()}};
document.getElementById('eb-copy').onclick=()=>{
  const d=load();let out=`【文字修改】${FILE}\n`,cnt=0;
  Object.keys(d.edits).forEach(k=>{const o=d.orig[k]||fresh[k]||[];(d.edits[k]||[]).forEach((t,i)=>{if(o[i]!==t){cnt++;out+=`\n${cnt}. 原：${(o[i]??'(?)').trim()}\n   改：${t.trim()}\n`}})});
  if(!cnt)out+='（目前沒有修改）';
  const done=()=>flash('已複製 ✓');
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(out).then(done,()=>fallbackCopy(out,done));else fallbackCopy(out,done)};
function fallbackCopy(t,cb){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();cb()}
let flTimer;function flash(m){const el=document.getElementById('eb-msg');if(!el)return;el.textContent=m;clearTimeout(flTimer);if(m&&m.includes('✓'))flTimer=setTimeout(()=>{el.textContent=editing?'編輯模式':''},1500)}
})();
</script>
</body>
</html>
