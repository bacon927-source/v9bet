<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V9Bet · Login Flow — Wireframe</title>
<style>
  :root{
    --ink:#2b2b2b; --line:#c9c9c9; --line2:#9a9a9a; --muted:#8a8a8a;
    --paper:#ffffff; --bg:#ececed; --fill:#f3f3f4; --solid:#3a3a3a;
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,"Noto Sans TC",Arial,sans-serif;color:var(--ink);background:var(--bg)}
  /* ---- layout ---- */
  .app{display:grid;grid-template-columns:260px 1fr 340px;min-height:100vh}
  aside{background:var(--paper);border-right:1px solid var(--line);padding:16px;overflow:auto}
  main{padding:24px;display:flex;flex-direction:column;align-items:center;gap:14px}
  .spec{background:var(--paper);border-left:1px solid var(--line);padding:16px;overflow:auto}
  h1{font-size:15px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:12px;margin:0 0 14px}
  .navlist{display:flex;flex-direction:column;gap:2px}
  .nav{display:flex;gap:8px;align-items:center;border:1px solid transparent;border-radius:6px;padding:7px 8px;cursor:pointer;font-size:13px}
  .nav:hover{background:var(--fill)}
  .nav.active{background:#e3e3e6;border-color:var(--line2);font-weight:600}
  .nav .num{width:20px;height:20px;flex:0 0 20px;border:1px solid var(--line2);border-radius:50%;display:grid;place-items:center;font-size:11px;color:var(--muted)}
  .nav.active .num{background:var(--solid);color:#fff;border-color:var(--solid)}
  .group-title{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
  /* ---- phone ---- */
  .stage{display:flex;flex-direction:column;align-items:center;gap:10px}
  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}
  .btn{border:1px solid var(--line2);background:#fff;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer}
  .btn:hover{background:var(--fill)}
  .state-tabs{display:flex;gap:4px;border:1px solid var(--line);border-radius:8px;padding:3px;background:#fff}
  .state-tabs button{border:0;background:none;padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--muted)}
  .state-tabs button.on{background:var(--solid);color:#fff}
  .phone{width:380px;border:2px solid var(--ink);border-radius:28px;background:var(--paper);padding:10px;box-shadow:0 6px 24px rgba(0,0,0,.12)}
  .notch{height:20px;display:flex;justify-content:center}
  .notch::after{content:"";width:120px;height:18px;background:var(--ink);border-radius:0 0 12px 12px}
  .screen{height:680px;overflow:auto;border:1px solid var(--line);border-radius:18px;padding:18px;background:#fff}
  .screen::-webkit-scrollbar{width:6px}.screen::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .scr-title{text-align:center;font-weight:700;font-size:16px;margin:2px 0 4px;position:relative}
  .scr-title .x{position:absolute;left:0;top:0;color:var(--muted);font-weight:400}
  .scr-step{text-align:center;color:var(--muted);font-size:12px;margin-bottom:14px}
  /* wireframe primitives */
  .field{border:1px dashed var(--line2);border-radius:10px;padding:13px 14px;color:var(--muted);margin:10px 0;display:flex;justify-content:space-between;align-items:center;background:var(--fill)}
  .field small{color:#b0b0b0}
  .row{display:flex;gap:10px}
  .row>*{flex:1}
  .opt{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:8px 0;display:flex;align-items:center;gap:12px}
  .opt.sel{border-color:var(--solid);border-width:2px}
  .dot{width:18px;height:18px;border:1px solid var(--line2);border-radius:50%;flex:0 0 18px}
  .dot.on{border-color:var(--solid);border-width:5px}
  .sq{width:18px;height:18px;border:1px solid var(--line2);border-radius:4px;flex:0 0 18px}
  .sq.on{background:var(--solid)}
  .ph{height:90px;border:1px dashed var(--line2);border-radius:10px;display:grid;place-items:center;color:#b6b6b6;background:var(--fill);margin:10px 0}
  .cta{background:var(--solid);color:#fff;text-align:center;border-radius:24px;padding:14px;margin:16px 0 8px;font-weight:600}
  .cta.ghost{background:#fff;color:var(--muted);border:1px solid var(--line2)}
  .cta.disabled{background:#cfcfcf;color:#fff}
  .link{text-align:center;color:#666;font-size:13px;margin-top:8px}
  .link b{color:var(--ink);text-decoration:underline}
  .hint{font-size:12px;color:var(--muted);margin:6px 2px}
  .badge{display:inline-block;font-size:10px;border:1px solid var(--line2);border-radius:4px;padding:1px 6px;color:var(--muted);vertical-align:middle;margin-left:6px}
  .badge.req{border-color:#b56;color:#b56}
  .otpcells{display:flex;gap:8px;justify-content:center;margin:18px 0}
  .otpcells span{width:42px;height:52px;border:1px solid var(--line2);border-radius:8px;display:grid;place-items:center;font-size:20px;color:var(--muted)}
  .otpcells span.f{border-color:var(--solid);border-width:2px}
  .err{border:1px solid #c98;background:#fbf2ef;color:#a55;border-radius:8px;padding:10px 12px;font-size:12px;margin:8px 0}
  .checklist .ci{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:10px;padding:12px;margin:8px 0}
  .checklist .ci .num{width:22px;height:22px;border:1px solid var(--line2);border-radius:50%;display:grid;place-items:center;font-size:11px;color:var(--muted);flex:0 0 22px}
  .checklist .ci.done .num{background:var(--solid);color:#fff;border-color:var(--solid)}
  .checklist .ci .g{flex:1}
  .checklist .ci .g small{color:var(--muted);font-size:11px;display:block}
  .dots{display:flex;gap:6px;justify-content:center;margin:14px 0}
  .dots i{width:7px;height:7px;border-radius:50%;background:var(--line2)}
  .dots i.on{background:var(--solid);width:18px;border-radius:4px}
  .promo{border:1px dashed var(--line2);border-radius:12px;padding:14px;margin:10px 0;background:var(--fill)}
  .promo .tag{font-size:10px;border:1px solid var(--line2);border-radius:4px;padding:1px 6px;color:var(--muted)}
  /* social login */
  .or{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:11px;margin:14px 0 4px}
  .or::before,.or::after{content:"";flex:1;height:1px;background:var(--line)}
  .socbtn{display:flex;align-items:center;gap:10px;border:1px solid var(--line2);border-radius:10px;padding:11px 14px;margin:8px 0;font-size:13px;background:#fff;cursor:pointer}
  .socbtn .ic{width:22px;height:22px;border:1px solid var(--line2);border-radius:50%;display:grid;place-items:center;font-size:11px;color:var(--muted);flex:0 0 22px}
  .socbtn small{margin-left:auto;color:#b0b0b0;font-size:10px}
  .socbtn .last{margin-left:auto;font-size:9px;border:1px solid var(--solid);border-radius:4px;padding:1px 5px;color:var(--solid)}
  .ccpop{border:1px solid var(--line2);border-radius:10px;background:#fff;box-shadow:0 6px 18px rgba(0,0,0,.08);margin:-4px 0 10px;overflow:hidden}
  .ccpop .cc{padding:11px 14px;font-size:13px;display:flex;align-items:center;gap:8px;color:#444}
  .ccpop .cc.on{background:var(--fill);font-weight:700}
  .ccpop .cc small{margin-left:auto;color:#b0b0b0}
  .mtabs{display:flex;border:1px solid var(--line2);border-radius:10px;overflow:hidden;margin:10px 0;font-size:13px;text-align:center}
  .mtabs span{flex:1;padding:9px 0;color:var(--muted);background:var(--fill)}
  .mtabs span.on{background:#fff;color:#222;font-weight:700;box-shadow:inset 0 -2px 0 var(--solid)}
  .socrow .sic{position:relative}
  .socrow .lu{position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-size:8px;border:1px solid var(--solid);color:var(--solid);background:#fff;border-radius:4px;padding:0 4px;white-space:nowrap}
  .prog3{display:flex;gap:5px;margin:10px 0 2px}
  .prog3 .p{flex:1;font-size:9.5px;text-align:center;padding:5px 0;border:1px solid var(--line2);border-radius:7px;color:var(--muted);background:var(--fill)}
  .prog3 .p.on{background:var(--solid);border-color:var(--solid);color:#fff;font-weight:700}
  .prog3 .p.done{border-color:var(--solid);color:var(--solid)}
  .grp{font-size:11px;font-weight:700;color:#555;margin:12px 0 2px;display:flex;align-items:center;gap:6px}
  .socrow{display:flex;justify-content:center;gap:26px;margin:12px 0 4px}
  .socrow .sic{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
  .socrow .c{width:46px;height:46px;border:1px solid var(--line2);border-radius:50%;display:grid;place-items:center;font-size:14px;font-weight:700;color:var(--muted);background:#fff}
  .socrow small{font-size:10px;color:var(--muted)}
  /* spec panel */
  .spec h2{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:18px 0 6px}
  .spec h2:first-child{margin-top:0}
  .spec ul{margin:0;padding-left:16px}
  .spec li{margin:4px 0;font-size:12.5px}
  .stlist{display:flex;flex-wrap:wrap;gap:6px}
  .pill{font-size:11px;border:1px solid var(--line2);border-radius:12px;padding:2px 9px;background:var(--fill)}
  .api{font-family:ui-monospace,Menlo,monospace;font-size:11px;background:var(--fill);border:1px solid var(--line);border-radius:6px;padding:8px;white-space:pre-wrap;color:#555}
  .legend{font-size:11px;color:var(--muted);border-top:1px solid var(--line);margin-top:14px;padding-top:10px}
</style>
</head>
<body>
<div class="app">
  <!-- LEFT: flow nav -->
  <aside>
    <h1>Login Flow</h1>
    <p class="sub">Low-fidelity wireframe · Mobile / App first<br>Multi-method login, recovery & session security<br>Split out from the sign-up flow (Jul 16)</p>
    <div id="nav"></div>
    <div class="legend">
      Grayscale wireframe only, no visual design.<br>
      <span class="badge req">Required</span> = mandatory ·
      <span class="badge">app only</span> = App only<br>
      Right panel: spec / states / API fields for Dev.
    </div>
  </aside>

  <!-- CENTER: phone -->
  <main>
    <div class="toolbar">
      <button class="btn" id="prev">← Previous</button>
      <div class="state-tabs" id="states"></div>
      <button class="btn" id="next">Next →</button>
    </div>
    <div class="phone">
      <div class="notch"></div>
      <div class="screen" id="screen"></div>
    </div>
    <div class="hint" id="bread"></div>
  </main>

  <!-- RIGHT: spec -->
  <div class="spec" id="spec"></div>
</div>

<script>
/* ---------- wireframe component helpers ---------- */
const F = (label, sub='') => `<div class="field"><span>${label}</span>${sub?`<small>${sub}</small>`:''}</div>`;
const CTA = (t, mod='') => `<div class="cta ${mod}">${t}</div>`;
const OPT = (t, sel=false, kind='dot') => `<div class="opt ${sel?'sel':''}"><span class="${kind} ${sel?'on':''}"></span><span style="flex:1">${t}</span></div>`;
const SOC = (ic, t, sub='', last=false) => `<div class="socbtn"><span class="ic">${ic}</span><span>${t}</span>${last?`<span class="last">Last used</span>`:sub?`<small>${sub}</small>`:''}</div>`;

/* ---------- screen definitions ---------- */
const screens = [
{
  group:"A · Login", id:"login", title:"Login",
  states:["Password","One-time code","Biometric / Passkey"],
  render:(s)=>`
    <div class="scr-title"><span class="x">✕</span>Login</div>
    <div class="ph" style="height:64px">[ V9 Logo ]</div>
    <div class="socrow" style="margin-top:16px">
      <div class="sic"><span class="lu">Last used</span><span class="c">G</span><small>Google</small></div>
      <div class="sic"><span class="c" style="font-size:10px">LINE</span><small>LINE</small></div>
      <div class="sic"><span class="c">X</span><small>X</small></div>
    </div>
    <div class="or">or login with</div>
    <div class="mtabs"><span class="${s===1?'on':''}">One-time code</span><span class="${s===1?'':'on'}">Password</span></div>
    ${F("Email / Phone number")}
    ${s===0?F("Password","👁")
      :s===1?`<div class="hint">We'll send a one-time code via Zalo ZNS / SMS / LINE / WhatsApp / Email — no password needed.</div>`
      :`<div class="ph" style="height:100px">👤 Face ID / Passkey (WebAuthn)</div>`}
    <div class="opt"><span class="sq on"></span><span style="flex:1">Keep me logged in</span></div>
    ${CTA(s===1?"Send code":"Login")}
    <div class="link"><b>Forgot password?</b></div>
    <div class="link">No account? <b>Sign Up</b></div>`,
  spec:{
    goal:"Login home: social icon row on top (last-used badge), then One-time code | Password tabs; biometric/passkey for returning devices.",
    states:["password tab","one-time code tab (no password)","biometric / passkey (WebAuthn)","social icon tap → Google / LINE / X branch","lockout → Security screen","risk trigger → step-up verification"],
    fields:["identifier(email|phone, single field)","method(password|one_time_code|passkey|google|line|x)","secret? / otp_code? / webauthn_assertion?","remember(bool)"],
    api:"POST /auth/login { identifier, method, ... }\n← { session, requires_stepup? }\nerr: LOCKED / RISK_STEPUP / INVALID_CREDENTIALS",
    notes:["Social row promoted to the top; 'Last used' badge above the provider icon reduces trial-and-error.","'Forgot account' removed — the link is password recovery only (see Recovery).","'Keep me logged in' explicit — high-frequency bettors feel session expiry the most.","Analytics: login event carries the method param, mirrors sign_up."]
  }
},
{
  group:"A · Login", id:"otc", title:"One-time Code Login",
  states:["Send","Enter code","Wrong / resend"],
  render:(s)=>s===0?`
    <div class="scr-title"><span class="x">←</span>One-time Code</div>
    <div class="scr-step">We'll send a code to your verified contact</div>
    ${OPT("📱 &nbsp; Phone +66 ****1234 <small style='color:#b0b0b0'>verified</small>", true)}
    ${OPT("✉️ &nbsp; Email b***@gmail.com <small style='color:#b0b0b0'>verified</small>", false)}
    <div class="hint">＊ Phone code via Zalo ZNS / SMS / LINE / WhatsApp (market default); email code to inbox.</div>
    ${CTA("Send code")}`
  :`
    <div class="scr-title"><span class="x">←</span>Enter Code</div>
    <div class="scr-step">Code sent via Zalo ZNS to +66 ****1234</div>
    <div class="otpcells"><span class="f">_</span><span>_</span><span>_</span><span>_</span><span>_</span><span>_</span></div>
    ${s===2?`<div class="err">Wrong code, please try again (2 attempts left)</div>`:''}
    <div class="link">Didn't get it? <b>Resend (60s)</b> · <b>Change channel</b></div>
    ${CTA("Login")}`,
  spec:{
    goal:"Passwordless login: code to a verified contact (member selects when both verified), then straight into the session.",
    states:["choose contact (rule: one verified → forced)","code entry (resend countdown)","wrong code (attempts left)","locked → password / Live Chat fallback"],
    fields:["identifier","anchor(phone|email)","channel","otp_code"],
    api:"POST /auth/login/otc/send { identifier, anchor, channel }\nPOST /auth/login/otc/verify { otp_code } ← { session }\nerr: OTP_WRONG / OTP_EXPIRED / OTP_LOCKED",
    notes:["Same anchor + channel rules as the Verification Flow (Unified OTP docx) — keep in sync.","Fallback after lock: password tab or Live Chat.","Highest-value for users who forget passwords — expected to cut recovery tickets."]
  }
},
{
  group:"A · Login", id:"passkey", title:"Biometric / Passkey",
  states:["Prompt","Success","Fallback"],
  render:(s)=>s===0?`
    <div class="scr-title"><span class="x">←</span>Face ID / Passkey</div>
    <div class="ph" style="height:150px">👤<br><small>[ WebAuthn prompt ]</small></div>
    <div class="scr-step">Confirm with Face ID / fingerprint / device PIN</div>
    ${CTA("Use Face ID / Passkey")}
    <div class="link"><b>Use password instead</b></div>`
  :s===1?`
    <div class="scr-title">Welcome back ✓</div>
    <div class="ph" style="height:110px">✓<br><small>passkey verified</small></div>
    <div class="scr-step">Logged in as v9_user*** — continuing…</div>
    ${CTA("Continue")}`
  :`
    <div class="scr-title"><span class="x">←</span>Passkey Unavailable</div>
    <div class="err">This device / browser can't use the saved passkey.</div>
    ${CTA("Login with password")}
    ${CTA("Login with one-time code",'ghost')}`,
  spec:{
    goal:"Returning-device login via WebAuthn passkey / biometrics; graceful fallback to password or one-time code.",
    states:["prompt","verifying","success → session","cancelled / unsupported → fallback","passkey revoked → re-enroll in setup"],
    fields:["webauthn_assertion","device_id"],
    api:"POST /auth/login/webauthn { assertion } ← { session }\nerr: PASSKEY_INVALID / NOT_ENROLLED",
    notes:["Targets high InAppWebView traffic — biggest returning-user win (P0 per auth analysis).","Enrolment happens in Setup Step 2 (Face ID / biometric / passkey).","Availability degrades silently — button hidden when the platform can't do WebAuthn."]
  }
},
{
  group:"B · Recovery", id:"forgot", title:"Forgot Password",
  states:["Select mode","Enter contact","Enter code","Reset password"],
  render:(s)=>s===0?`
    <div class="scr-title"><span class="x">✕</span>Select Verification Mode</div>
    <div class="scr-step">Please choose how you would like to receive your one-time password (OTP)</div>
    ${OPT("✉️ &nbsp; Send via Email", false)}
    ${OPT("📱 &nbsp; Send via SMS", true)}
    ${CTA("Request OTP")}
    <div class="hint">＊ Works for Active or Dormant accounts.</div>`
  :s===1?`
    <div class="scr-title"><span class="x">✕</span>Verify Phone Number</div>
    <div class="scr-step">Enter the contact registered to your account</div>
    ${F("+84 ▾ &nbsp; Phone number","Required")}
    ${CTA("Get OTP",'disabled')}
    <div class="hint">＊ We never reveal whether an account exists — the code is sent only if the contact matches (Unified OTP docx).</div>`
  :s===2?`
    <div class="scr-title"><span class="x">←</span>Enter Code</div>
    <div class="scr-step">We sent code verification to <b>091***233</b></div>
    <div class="otpcells"><span class="f">_</span><span>_</span><span>_</span><span>_</span><span>_</span><span>_</span></div>
    <div class="link">Resent code in <b>00:32</b></div>
    ${CTA("Verify",'disabled')}`
  :`
    <div class="scr-title"><span class="x">←</span>Create New Password</div>
    <div class="scr-step">Account ID: AHHHHHH</div>
    ${F("New password","👁 &nbsp; ●●○ Medium")}
    ${F("Confirm new password","👁")}
    ${CTA("Done")}`,
  spec:{
    goal:"Password recovery per the OTP design: select mode (Email / SMS) → registered contact → shared OTP component → reset (Account ID revealed only after OTP passes) with strength meter.",
    states:["select mode","enter contact (mismatch = silent, same UI)","code entry (32s resend, 3rd resend → 03:00)","reset form + strength meter","done → logged in"],
    fields:["mode(email|sms)","identifier","otp_code","new_password"],
    api:"POST /auth/forgot/start { mode, identifier } (always 200)\nPOST /auth/forgot/verify { otp_code } ← { account_id }\nPOST /auth/forgot/reset { new_password }",
    notes:["Full rules live in the Verification Flow page (Forgot Password screen) — single source, don't fork.","Account ID shown only AFTER OTP success (design).","Recovery contact does not auto-become Verified (business TBD).","After reset, log the member in directly — don't bounce back to the form."]
  }
},
{
  group:"C · Security", id:"security", title:"Lockout & Risk Step-up",
  states:["Locked (too many attempts)","New device → step-up","Session rules"],
  render:(s)=>s===0?`
    <div class="scr-title"><span class="x">✕</span>Account Locked</div>
    <div class="err">Too many failed login attempts. Try again in 15:00.</div>
    <div class="scr-step">Or verify your identity to unlock now</div>
    ${CTA("Unlock via one-time code")}
    ${CTA("Contact Live Chat",'ghost')}`
  :s===1?`
    <div class="scr-title"><span class="x">✕</span>New Device Check</div>
    <div class="scr-step">First login from this device — quick verification</div>
    ${OPT("📱 &nbsp; Phone OTP +66 ****1234 <small style='color:#b0b0b0'>verified</small>", true)}
    ${OPT("✉️ &nbsp; Email OTP b***@gmail.com <small style='color:#b0b0b0'>verified</small>", false)}
    ${CTA("Send OTP")}
    <div class="hint">＊ Risk-triggered step-up (new device / geo change / VPN pattern) — reuses the Verification Flow.</div>`
  :`
    <div class="scr-title">Session Rules</div>
    <div class="scr-step">Reference — how sessions behave</div>
    ${tog("Keep me logged in (30 days)",true)}
    ${tog("Re-verify for sensitive actions",true)}
    ${tog("Single active session per device type",false)}
    <div class="hint">＊ Sensitive actions always re-verify via the Unified OTP flow regardless of session age (rule matrix).</div>`,
  spec:{
    goal:"Login-side security: attempt lockout with self-unlock, risk-triggered new-device step-up, and session policy.",
    states:["locked (cooldown timer)","self-unlock via OTP","new device / risk → step-up OTP","session policy reference"],
    fields:["lock_until","risk_flags[]","device_id","session_ttl"],
    api:"err: LOCKED { retry_after } / RISK_STEPUP → open step-up sheet\nPOST /auth/stepup/* (see Verification Flow)",
    notes:["Lockout: N failed attempts → cooldown; self-unlock via OTP beats waiting (fewer Live Chat tickets).","Step-up reuses the Verification Flow sheet — one component.","Session: 'Keep me logged in' is explicit; sensitive actions re-verify regardless (docx rule matrix)."]
  }
},
];

/* small components used inside screens */
function ci(n,label,tag,done){return `<div class="ci ${done?'done':''}"><span class="num">${done?'✓':n}</span><span class="g">${label}${tag?`<small>${tag}</small>`:''}</span><span style="color:#bbb">›</span></div>`}
function tog(label,on){return `<div class="opt"><span style="flex:1">${label}</span><span style="width:40px;height:22px;border-radius:12px;border:1px solid var(--line2);background:${on?'var(--solid)':'#fff'};position:relative"><span style="position:absolute;top:2px;${on?'right:2px':'left:2px'};width:16px;height:16px;border-radius:50%;background:#fff;border:1px solid var(--line2)"></span></span></div>`}

/* ---------- runtime ---------- */
let idx=0, st=0;
const navEl=document.getElementById('nav');
function buildNav(){
  let html='', lastG='';
  screens.forEach((sc,i)=>{
    if(sc.group!==lastG){html+=`<div class="group-title">${sc.group}</div>`;lastG=sc.group;}
    html+=`<div class="nav ${i===idx?'active':''}" data-i="${i}"><span class="num">${i+1}</span>${sc.title}</div>`;
  });
  navEl.innerHTML=html;
  navEl.querySelectorAll('.nav').forEach(n=>n.onclick=()=>{idx=+n.dataset.i;st=0;draw();});
}
function draw(){
  const sc=screens[idx];
  document.getElementById('screen').innerHTML=sc.render(st);
  // states
  const stWrap=document.getElementById('states');
  stWrap.innerHTML=sc.states.map((s,i)=>`<button class="${i===st?'on':''}" data-s="${i}">${s}</button>`).join('');
  stWrap.querySelectorAll('button').forEach(b=>b.onclick=()=>{st=+b.dataset.s;draw();});
  document.getElementById('bread').textContent=`Screen ${idx+1} / ${screens.length} · ${sc.title}${sc.step?' · '+sc.step:''}`;
  // spec
  const sp=sc.spec;
  document.getElementById('spec').innerHTML=`
    <h2>Screen Goal</h2><p style="font-size:13px;margin:0">${sp.goal}</p>
    <h2>States</h2><div class="stlist">${sp.states.map(x=>`<span class="pill">${x}</span>`).join('')}</div>
    <h2>Fields</h2><div class="stlist">${sp.fields.map(x=>`<span class="pill">${x}</span>`).join('')}</div>
    <h2>API / Data</h2><div class="api">${sp.api}</div>
    <h2>Dev Notes</h2><ul>${sp.notes.map(x=>`<li>${x}</li>`).join('')}</ul>`;
  buildNav();
}
document.getElementById('prev').onclick=()=>{if(idx>0){idx--;st=0;draw();}};
document.getElementById('next').onclick=()=>{if(idx<screens.length-1){idx++;st=0;draw();}};
draw();
</script>
<script>
/* ---------- ✏️ 文字編輯模式：右下角開關，點字直接改；存 localStorage，重整 / 切畫面不會消失 ---------- */
(function(){
const FILE=location.pathname.split('/').pop()||'page';
const KEY='wfTextEdits:'+FILE;
const DYN=['screen','spec','bread'];                                   // draw() 重繪的區塊
const STATIC=[['aside h1','h1'],['aside .sub','sub'],['aside .legend','legend']]; // 靜態區塊
const dynKey=id=>id==='screen'?`d|${idx}|${st}|screen`:`d|${idx}|${id}`;
const nodes=el=>{const w=document.createTreeWalker(el,NodeFilter.SHOW_TEXT),a=[];let n;while(n=w.nextNode())a.push(n);return a};
const load=()=>{try{const d=JSON.parse(localStorage.getItem(KEY)||'{}');return{edits:d.edits||{},orig:d.orig||{}}}catch(e){return{edits:{},orig:{}}}};
const persist=d=>localStorage.setItem(KEY,JSON.stringify(d));
const fresh={};                                                        // 每個 key 的原始文字（重繪後快照）
function applyKey(el,k){const v=load().edits[k];if(!v)return;const ns=nodes(el);for(let i=0;i<Math.min(ns.length,v.length);i++)ns[i].nodeValue=v[i]}
function snapApply(el,k){if(!(k in fresh))fresh[k]=nodes(el).map(n=>n.nodeValue);applyKey(el,k)}
function record(el,k){
  const d=load(),cur=nodes(el).map(n=>n.nodeValue),o=fresh[k]||d.orig[k];
  if(o&&cur.length===o.length&&cur.every((t,i)=>t===o[i])){delete d.edits[k];delete d.orig[k]}
  else{d.edits[k]=cur;if(o&&!d.orig[k])d.orig[k]=o}
  persist(d);flash('已儲存 ✓')}
const _draw=draw;
draw=function(){_draw();DYN.forEach(id=>{const el=document.getElementById(id);if(el)snapApply(el,dynKey(id))})};
STATIC.forEach(([sel,k])=>{const el=document.querySelector(sel);if(el){snapApply(el,'s|'+k);el.addEventListener('input',()=>record(el,'s|'+k))}});
DYN.forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',()=>record(el,dynKey(id)))});
draw();                                                                // 載入時套用已存的修改
/* --- 編輯開關 --- */
let editing=false;
const plainOK=(()=>{const t=document.createElement('div');try{t.contentEditable='plaintext-only'}catch(e){return false}return t.contentEditable==='plaintext-only'})();
const editables=()=>DYN.map(id=>document.getElementById(id)).concat(STATIC.map(([sel])=>document.querySelector(sel))).filter(Boolean);
function setEditing(on){editing=on;
  editables().forEach(el=>{if(on){el.setAttribute('contenteditable',plainOK?'plaintext-only':'true');el.setAttribute('spellcheck','false')}else{el.removeAttribute('contenteditable')}});
  document.body.toggleAttribute('data-editing',on);
  const b=document.getElementById('eb-toggle');b.textContent=on?'✅ 完成':'✏️ 編輯文字';b.classList.toggle('on',on);
  flash(on?'點畫面上的字直接修改（自動儲存）':'')}
document.addEventListener('beforeinput',e=>{if(editing&&!plainOK&&(e.inputType==='insertParagraph'||e.inputType==='insertLineBreak'))e.preventDefault()},true);
/* --- 工具列 --- */
const css=document.createElement('style');css.textContent=`
#editbar{position:fixed;right:14px;bottom:14px;z-index:9999;display:flex;gap:6px;align-items:center;background:#fff;border:1px solid #d0d3d8;border-radius:10px;padding:6px 8px;box-shadow:0 4px 18px rgba(0,0,0,.14);font:12px/1.4 -apple-system,"Noto Sans TC",Arial,sans-serif}
#editbar button{font:inherit;border:1px solid #d0d3d8;background:#fff;border-radius:7px;padding:4px 9px;cursor:pointer;color:#333}
#editbar button:hover{border-color:#19c37d;color:#0f8a5f}
#editbar #eb-toggle.on{background:#19c37d;border-color:#19c37d;color:#fff}
#eb-msg{color:#0f8a5f;font-size:11px;max-width:170px}
body[data-editing] [contenteditable]{outline:1.5px dashed #19c37d;outline-offset:3px;border-radius:3px;cursor:text}
body[data-editing] [contenteditable]:focus{outline-style:solid}`;
document.head.appendChild(css);
const bar=document.createElement('div');bar.id='editbar';
bar.innerHTML=`<button id="eb-toggle" title="開啟後直接點畫面文字修改，自動儲存在此瀏覽器">✏️ 編輯文字</button><button id="eb-copy" title="複製修改清單（原文 → 新文），可貼給 Claude 寫回 HTML">📋 複製修改</button><button id="eb-reset" title="清除此頁所有文字修改並還原">↺ 還原</button><span id="eb-msg"></span>`;
document.body.appendChild(bar);
document.getElementById('eb-toggle').onclick=()=>setEditing(!editing);
document.getElementById('eb-reset').onclick=()=>{if(confirm('還原此頁所有文字修改？')){localStorage.removeItem(KEY);location.reload()}};
document.getElementById('eb-copy').onclick=()=>{
  const d=load();let out=`【文字修改】${FILE}\n`,cnt=0;
  Object.keys(d.edits).forEach(k=>{const o=d.orig[k]||fresh[k]||[];(d.edits[k]||[]).forEach((t,i)=>{if(o[i]!==t){cnt++;out+=`\n${cnt}. 原：${(o[i]??'(?)').trim()}\n   改：${t.trim()}\n`}})});
  if(!cnt)out+='（目前沒有修改）';
  const done=()=>flash('已複製 ✓');
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(out).then(done,()=>fallbackCopy(out,done));else fallbackCopy(out,done)};
function fallbackCopy(t,cb){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();cb()}
let flTimer;function flash(m){const el=document.getElementById('eb-msg');if(!el)return;el.textContent=m;clearTimeout(flTimer);if(m&&m.includes('✓'))flTimer=setTimeout(()=>{el.textContent=editing?'編輯模式':''},1500)}
})();
</script>
</body>
</html>
